// A short, cheerful three-note chime synthesized on the fly — no audio files needed.
function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + i * 0.08);
      gain.gain.linearRampToValueAtTime(0.15, now + i * 0.08 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.4);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + i * 0.08);
      osc.stop(now + i * 0.08 + 0.42);
    });
  } catch {}
}

// Samples a cover image to find a representative accent color. Falls back silently
// (resolves null) on any failure — e.g. cross-origin images without CORS headers.
function extractDominantColor(src) {
  return new Promise((resolve) => {
    if (!src) { resolve(null); return; }
    try {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        try {
          const size = 24;
          const canvas = document.createElement("canvas");
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, size, size);
          const data = ctx.getImageData(0, 0, size, size).data;
          let r = 0, g = 0, b = 0, count = 0;
          for (let i = 0; i < data.length; i += 4) {
            if (data[i + 3] < 200) continue;
            const rr = data[i], gg = data[i + 1], bb = data[i + 2];
            const max = Math.max(rr, gg, bb), min = Math.min(rr, gg, bb);
            if (max > 235 && min > 210) continue; // skip near-white
            if (max < 30) continue; // skip near-black
            r += rr; g += gg; b += bb; count++;
          }
          if (count === 0) { resolve(null); return; }
          r = Math.round(r / count); g = Math.round(g / count); b = Math.round(b / count);
          resolve("#" + [r, g, b].map((x) => x.toString(16).padStart(2, "0")).join(""));
        } catch { resolve(null); }
      };
      img.onerror = () => resolve(null);
      img.src = src;
    } catch { resolve(null); }
  });
}

// Shared cache so the same cover image isn't re-analyzed every time it shows up
// across different Dashboard sections (Top 10, Best of, Wishlist, etc).
const dominantColorCache = new Map();
function useDominantColor(src) {
  const [color, setColor] = useState(() => (src && dominantColorCache.has(src) ? dominantColorCache.get(src) : null));
  useEffect(() => {
    if (!src) { setColor(null); return; }
    if (dominantColorCache.has(src)) { setColor(dominantColorCache.get(src)); return; }
    let cancelled = false;
    extractDominantColor(src).then((c) => {
      if (c) dominantColorCache.set(src, c);
      if (!cancelled) setColor(c);
    });
    return () => { cancelled = true; };
  }, [src]);
  return color;
}

                  <div className="w-full h-full flex items-center justify-center text-[#5C574F]"><Dices size={28} /></div>

                    {safeIndex + 1}
                  </span>
                )}
              </div>
            );
          })}
        </div>
        <div
          className="absolute rounded-full pointer-events-none"
          style={{
            bottom: -8, left: "50%", transform: "translateX(-50%)",
            width: "min(220px, 50vw)", height: 18,
            background: "radial-gradient(ellipse, rgba(0,0,0,0.5), transparent 72%)",
            filter: "blur(5px)",

}

/* ---------------- IMAGE RESIZE (for uploaded photos, keeps storage/sync small) ---------------- */
function resizeImageFile(file, maxDim = 640, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Lesen fehlgeschlagen"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Bild ungültig"));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------------- COMPLEXITY CLASSIFICATION ---------------- */
// Based on community consensus around BGG's "weight" (1-5): under ~2.0 reads as a family
// game, ~2.0-3.5 as an enthusiast ("Kenner") game, above that as an expert game. Party games
// are classified by genre (BGG category) rather than weight, since they're often light but
// play very differently from a family strategy game.
function complexityLabel(game) {
  const categories = game.categories || [];
  if (categories.some((c) => /party/i.test(c))) return "Partyspiel";
  const w = parseFloat(game.complexity);
  if (!w || isNaN(w)) return null;
  if (w < 1.5) return "Einsteigerspiel";
  if (w < 2.0) return "Familienspiel";
  if (w < 2.5) return "Gehobenes Familienspiel";
  if (w < 3.0) return "Leichtes Kennerspiel";
  if (w < 3.5) return "Kennerspiel";
  if (w < 4.0) return "Anspruchsvolles Kennerspiel";
  return "Expertenspiel";
}

function tagIcon(name) {
  const n = name.toLowerCase();
  if (/card|hand management|deck building|drafting/.test(n)) return CardIcon;
  if (/^dice$|dice rolling|roll.*spin|push your luck/.test(n)) return Dices;
  if (/^party/.test(n)) return Sparkles;
  if (/humor/.test(n)) return Laugh;
  if (/fantasy|mytholog/.test(n)) return Star;
  if (/sci-?fi|space exploration|video game/.test(n)) return Rocket;
  if (/economic|city building|industry|trains?|transport/.test(n)) return Building;
  if (/civilization|political|medieval/.test(n)) return Crown;
  if (/fighting|wargame|military|miniature/.test(n)) return Sword;
  if (/horror|zombies/.test(n)) return Skull;
  if (/puzzle|pattern building/.test(n)) return Puzzle;
  if (/deduction|memory|spies/.test(n)) return Eye;
  if (/bluffing|murder.?mystery/.test(n)) return MaskIcon;
  if (/negotiat|trading|auction|bidding/.test(n)) return Handshake;
  if (/voting/.test(n)) return Users;
  if (/real-time|action points|simultaneous/.test(n)) return Zap;
  if (/time$/.test(n)) return Clock;
  if (/travel|nautical|explorat|racing|adventure|route.?network|point to point/.test(n)) return Compass;
  if (/animals/.test(n)) return PawPrint;
  if (/movies|tv|radio/.test(n)) return Tv;
  if (/word game|storytelling|role playing/.test(n)) return BookOpen;
  if (/grid movement|hex-and-counter|modular board|tile placement/.test(n)) return Grid3x3;
  if (/legacy game/.test(n)) return Archive;
  if (/cooperative/.test(n)) return Heart;
  if (/area control|territory building|worker placement|engine building/.test(n)) return Shield;
  if (/set collection|trick-taking|variable player powers/.test(n)) return Layers;
  if (/abstract strategy/.test(n)) return Block;
  if (/action.*dexterity/.test(n)) return Zap;
  if (/sports/.test(n)) return TrendingUp;
  return Dices;
}

/* ---------------- RICH TEXT EDITOR (Bold, Kursiv, Liste, Titel, Subheadline, Text) ---------------- */
function RichTextEditor({ value, onChange, placeholder, minHeight = 100 }) {
  const editorRef = React.useRef(null);
  const initialized = React.useRef(false);
  const [expanded, setExpanded] = useState(false);
  const [colorPickerOpen, setColorPickerOpen] = useState(false);

  useEffect(() => {
    if (editorRef.current && !initialized.current) {
      editorRef.current.innerHTML = value || "";
      initialized.current = true;
    }
  }, []);

  const exec = (cmd, arg) => {
    if (editorRef.current) editorRef.current.focus();
    document.execCommand(cmd, false, arg || null);
    if (editorRef.current) onChange(editorRef.current.innerHTML);
  };

  const handlePaste = (e) => {
    // Force plain text on paste — strips all foreign formatting and colors from the source.
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData("text/plain");
    document.execCommand("insertText", false, text);
    if (editorRef.current) onChange(editorRef.current.innerHTML);
  };

  const handleInput = (e) => onChange(e.currentTarget.innerHTML);

  const clearAll = () => {
    if (!editorRef.current) return;
    editorRef.current.innerHTML = "";
    onChange("");
    editorRef.current.focus();
  };

  const TEXT_COLORS = [
    { label: "Standard", value: "#F2EDE4" },
    { label: "Flieder", value: "#6C7FE0" },
    { label: "Amber", value: "#D4A24C" },
    { label: "Türkis", value: "#4E8C82" },
    { label: "Rot", value: "#C1443C" },
  ];

  const ToolBtn = ({ children, onClick, className: cn = "", ariaLabel }) => (
    <button type="button" onClick={onClick} aria-label={ariaLabel} className={`h-9 px-2.5 flex items-center justify-center rounded-lg bg-[#262422] border border-[#3A3631] text-[#F2EDE4] text-xs shrink-0 ${cn}`}>
      {children}
    </button>
  );

  return (
    <div className={expanded ? "fixed inset-0 z-[70] bg-[#1C1B1A] flex flex-col" : "relative"}>
      {expanded && (
        <div className="shrink-0 border-b border-[#3A3631] px-4 flex items-center" style={{ paddingTop: "max(0.75rem, env(safe-area-inset-top))", paddingBottom: "0.75rem" }}>
          <span className="text-[#F2EDE4] font-display text-lg">Bearbeiten</span>
        </div>
      )}
      <div className={expanded ? "flex-1 overflow-y-auto p-4" : ""}>
        {expanded && (
          <div className="relative mb-2">
            <div className="flex items-center gap-1.5 overflow-x-auto pb-1">
              <ToolBtn ariaLabel="Fett" onClick={() => exec("bold")}><b>B</b></ToolBtn>
              <ToolBtn ariaLabel="Kursiv" onClick={() => exec("italic")}><i>I</i></ToolBtn>
              <ToolBtn ariaLabel="Aufzählung" onClick={() => exec("insertUnorderedList")}>• Liste</ToolBtn>
              <ToolBtn ariaLabel="Titel" onClick={() => exec("formatBlock", "H2")} className="font-semibold">Titel</ToolBtn>
              <ToolBtn ariaLabel="Subheadline" onClick={() => exec("formatBlock", "H3")}>Subheadline</ToolBtn>
              <ToolBtn ariaLabel="Normaler Text" onClick={() => exec("formatBlock", "P")} className="text-[#A39C8F]">Text</ToolBtn>
              <ToolBtn ariaLabel="Textfarbe" onClick={() => setColorPickerOpen((o) => !o)}>
                <span className="w-3.5 h-3.5 rounded-full border border-[#F2EDE4]/40" style={{ background: "conic-gradient(#6C7FE0,#D4A24C,#4E8C82,#C1443C,#6C7FE0)" }} />
              </ToolBtn>
            </div>
            {colorPickerOpen && (
              <div className="absolute top-11 left-0 z-10 bg-[#262422] border border-[#3A3631] rounded-[14px] p-2 flex gap-2 shadow-lg">
                {TEXT_COLORS.map((c) => (
                  <button
                    key={c.value}
                    type="button"
                    aria-label={c.label}
                    onClick={() => { exec("foreColor", c.value); setColorPickerOpen(false); }}
                    className="w-8 h-8 rounded-full border-2 border-[#1C1B1A]"
                    style={{ backgroundColor: c.value }}
                  />
                ))}
              </div>
            )}
          </div>
        )}
        <div
          ref={editorRef}
          contentEditable
          suppressContentEditableWarning
          onInput={handleInput}
          onPaste={handlePaste}
          role="textbox"
          aria-multiline="true"
          aria-label={placeholder}
          className="rte-content w-full border border-[#3A3631] rounded-[14px] px-3.5 py-3 pb-14 text-[#F2EDE4] text-base focus:outline-none focus:border-[#6C7FE0] overflow-y-auto"
          style={{ minHeight: expanded ? "60vh" : minHeight }}
          data-placeholder={placeholder}
        />
      </div>
      {!expanded ? (
        <button type="button" onClick={() => setExpanded(true)} aria-label="Vergrößern"
          className="absolute bottom-2.5 right-2.5 w-9 h-9 flex items-center justify-center rounded-lg bg-[#262422] border border-[#3A3631] text-[#5C574F]">
          <Maximize2 size={14} />
        </button>
      ) : (
        <div className="fixed z-[71] flex items-center gap-2" style={{ bottom: "max(1rem, env(safe-area-inset-bottom))", right: "1rem" }}>
          <button type="button" onClick={clearAll} aria-label="Gesamten Text löschen"
            className="w-9 h-9 flex items-center justify-center rounded-lg bg-[#262422] border border-[#3A3631] text-[#C1443C] shadow-lg">

            <Check size={14} /> Fertig
          </button>
        </div>
      )}
    </div>
  );
}

/* ---------------- IMAGE CROP (Zuschneiden/Zoomen vor dem Speichern) ---------------- */
function ImageCropModal({ src, onConfirm, onCancel }) {
  const CROP = 300;
  const [natSize, setNatSize] = useState(null);
  const [zoom, setZoom] = useState(1);
  const [offset, setOffset] = useState({ x: 0, y: 0 });
  const imgRef = React.useRef(null);
  const drag = React.useRef(null);
  const pinch = React.useRef(null);

  const coverScale = natSize ? Math.max(CROP / natSize.w, CROP / natSize.h) : 1;
  const totalScale = coverScale * zoom;

  const clampOffset = (o, scale) => {
    if (!natSize) return o;
    const drawW = natSize.w * scale, drawH = natSize.h * scale;
    const maxX = Math.max(0, (drawW - CROP) / 2);
    const maxY = Math.max(0, (drawH - CROP) / 2);
    return { x: Math.min(maxX, Math.max(-maxX, o.x)), y: Math.min(maxY, Math.max(-maxY, o.y)) };
  };

  const onTouchStart = (e) => {
    if (e.touches.length === 2) {
      const [t1, t2] = e.touches;
      pinch.current = { dist: Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY), zoom };
      drag.current = null;
    } else if (e.touches.length === 1) {
      drag.current = { x: e.touches[0].clientX, y: e.touches[0].clientY, offset };
      pinch.current = null;
    }
  };
  const onTouchMove = (e) => {
    e.preventDefault();
    if (e.touches.length === 2 && pinch.current) {
      const [t1, t2] = e.touches;
      const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      const newZoom = Math.min(3, Math.max(1, pinch.current.zoom * (dist / pinch.current.dist)));
      setZoom(newZoom);
      setOffset((o) => clampOffset(o, coverScale * newZoom));
    } else if (e.touches.length === 1 && drag.current) {
      const dx = e.touches[0].clientX - drag.current.x;
      const dy = e.touches[0].clientY - drag.current.y;
      setOffset(clampOffset({ x: drag.current.offset.x + dx, y: drag.current.offset.y + dy }, totalScale));
    }
  };
  const onTouchEnd = () => { drag.current = null; pinch.current = null; };

  const handleZoomSlider = (v) => {
    setZoom(v);
    setOffset((o) => clampOffset(o, coverScale * v));
  };

  const confirm = () => {
    if (!natSize || !imgRef.current) return;
    const OUT = 640;
    const canvas = document.createElement("canvas");
    canvas.width = OUT; canvas.height = OUT;
    const ctx = canvas.getContext("2d");
    const drawW = natSize.w * totalScale, drawH = natSize.h * totalScale;
    const outScale = OUT / CROP;
    const dx = (CROP - drawW) / 2 + offset.x;
    const dy = (CROP - drawH) / 2 + offset.y;
    try {
      ctx.drawImage(imgRef.current, dx * outScale, dy * outScale, drawW * outScale, drawH * outScale);
      onConfirm(canvas.toDataURL("image/jpeg", 0.9));
    } catch {
      onConfirm(src); // fallback: use the untouched image if cropping fails for any reason
    }
  };

  return (
    <div className="fixed inset-0 bg-black z-[75] flex flex-col">
      <div className="shrink-0 flex items-center justify-between px-5" style={{ paddingTop: "max(1rem, env(safe-area-inset-top))", paddingBottom: "1rem" }}>
        <button onClick={onCancel} className="text-[#A39C8F] p-1" aria-label="Abbrechen"><X size={22} /></button>
        <span className="text-[#F2EDE4] font-display text-lg">Zuschneiden</span>
        <button onClick={confirm} className="text-[#6C7FE0] p-1" aria-label="Übernehmen"><Check size={22} /></button>
      </div>
      <div className="flex-1 flex items-center justify-center">
        <div
          className="relative overflow-hidden rounded-2xl border-2 border-[#F2EDE4]/40"
          style={{ width: CROP, height: CROP, touchAction: "none" }}
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={onTouchEnd}
        >
          <img
            ref={imgRef}
            src={src}
            alt="Zuschneiden"
            onLoad={(e) => { const { naturalWidth: w, naturalHeight: h } = e.target; setNatSize({ w, h }); }}
            style={{
              position: "absolute", left: "50%", top: "50%",
              width: natSize ? natSize.w : "auto", height: natSize ? natSize.h : "auto",
              transform: `translate(-50%, -50%) translate(${offset.x}px, ${offset.y}px) scale(${totalScale})`,
              maxWidth: "none",
            }}
            draggable={false}
          />
        </div>
      </div>
      <div className="shrink-0 px-8" style={{ paddingBottom: "max(1.5rem, env(safe-area-inset-bottom))" }}>
        <p className="text-center text-xs text-[#5C574F] mb-3">Ziehen zum Verschieben, Regler zum Zoomen</p>
        <input
          type="range" min={1} max={3} step={0.01} value={zoom}
          onChange={(e) => handleZoomSlider(parseFloat(e.target.value))}
          className="w-full"
        />
      </div>
    </div>
  );
}

function ImagePickerSheet({ onAdd, onClose }) {
  const [urlMode, setUrlMode] = useState(false);

  const [urlError, setUrlError] = useState("");

  const uploadRef = React.useRef(null);

  const handleFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const dataUrl = await resizeImageFile(file);
    setCropSrc(dataUrl);
  };

  const submitUrl = () => {
    const trimmed = url.trim();
    if (!trimmed) return;
    setUrlChecking(true);
    setUrlError("");
    const img = new Image();
    const timer = setTimeout(() => { setUrlChecking(false); setUrlError("Diese Karte zieht nicht — Bild-Adresse nochmal prüfen."); }, 8000);

    img.onerror = () => { clearTimeout(timer); setUrlChecking(false); setUrlError("Diese Karte zieht nicht — Bild-Adresse nochmal prüfen."); };

  return (
    <div className="fixed top-0 left-0 right-0 bg-black/70 z-[70] flex items-end sm:items-center justify-center p-0 sm:p-6" style={{ height: "var(--app-height, 100dvh)" }} onClick={onClose}>

/* ---------------- PHOTO GALLERY (used in game form, play form, and detail view) ---------------- */
function PhotoGallerySection({ images, onAdd, onRemove, hero = false, editable = true }) {
  const [sheetOpen, setSheetOpen] = useState(false);
  const [lightboxIndex, setLightboxIndex] = useState(null);
  const [carouselIndex, setCarouselIndex] = useState(0);
  const touchStartX = React.useRef(0);
  const safeIndex = Math.min(carouselIndex, Math.max(images.length - 1, 0));

  const onCarouselTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const onCarouselTouchEnd = (e) => {
    const delta = e.changedTouches[0].clientX - touchStartX.current;
    if (delta < -40 && safeIndex < images.length - 1) setCarouselIndex(safeIndex + 1);
    else if (delta > 40 && safeIndex > 0) setCarouselIndex(safeIndex - 1);
  };

  return (
    <div>
      {hero && (
        <div className="flex justify-center mb-6 pt-2 pb-1">
          <div className="relative" style={{ width: 200, height: 200, maxWidth: "55vw", maxHeight: "55vw" }}>
            {images.length === 0 ? (
              <div className="w-full h-full rounded-2xl overflow-hidden border border-[#3A3631] bg-[#2E2B28] flex items-center justify-center">
                <Dices size={40} className="text-[#5C574F]" />
              </div>
            ) : (

function normalizeSyncUrl(url) {
  if (!url) return "";
  let u = url.trim();
  if (!u) return "";
  if (!u.endsWith("/")) u += "/";
  return u;
}
async function cloudPush(syncUrl, data) {
  const base = normalizeSyncUrl(syncUrl);
  if (!base) return;
  const payload = { ...data, updatedAt: Date.now() };
  const res = await fetch(base + "data.json", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error("Der Spielzug wurde nicht gewertet — Speichern in der Cloud fehlgeschlagen");
  return payload.updatedAt;
}
async function cloudPull(syncUrl) {
  const base = normalizeSyncUrl(syncUrl);
  if (!base) return null;
  const res = await fetch(base + "data.json");
  if (!res.ok) throw new Error("Karten ziehen fehlgeschlagen — Cloud-Abruf hat nicht geklappt");
  const json = await res.json();
  return json;
}

/* ---------------- BGG API (best effort, needs internet) ---------------- */
async function bggSearch(query) {
  const url = `https://boardgamegeek.com/xmlapi2/search?query=${encodeURIComponent(query)}&type=boardgame`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("BGG würfelt gerade nicht mit — nicht erreichbar");
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, "text/xml");
  const items = Array.from(xml.getElementsByTagName("item")).slice(0, 8);
  return items.map((it) => ({
    bggId: it.getAttribute("id"),
    name: it.getElementsByTagName("name")[0]?.getAttribute("value") || "Unbekannt",
    year: it.getElementsByTagName("yearpublished")[0]?.getAttribute("value") || "",
  }));
}
async function bggThing(bggId) {
  const url = `https://boardgamegeek.com/xmlapi2/thing?id=${bggId}&stats=1`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("BGG würfelt gerade nicht mit — nicht erreichbar");
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, "text/xml");
  const item = xml.getElementsByTagName("item")[0];
  if (!item) throw new Error("Fehlwurf — kein Ergebnis gefunden");
  const nameEl = Array.from(item.getElementsByTagName("name")).find(n => n.getAttribute("type") === "primary") || item.getElementsByTagName("name")[0];
  const getTxt = (tag) => item.getElementsByTagName(tag)[0]?.textContent || "";
  const getAttr = (tag) => item.getElementsByTagName(tag)[0]?.getAttribute("value") || "";
  const mechanisms = Array.from(item.getElementsByTagName("link")).filter(l => l.getAttribute("type") === "boardgamemechanic").map(l => l.getAttribute("value"));
  const categories = Array.from(item.getElementsByTagName("link")).filter(l => l.getAttribute("type") === "boardgamecategory").map(l => l.getAttribute("value"));
  const publishers = Array.from(item.getElementsByTagName("link")).filter(l => l.getAttribute("type") === "boardgamepublisher").map(l => l.getAttribute("value"));
  const designers = Array.from(item.getElementsByTagName("link")).filter(l => l.getAttribute("type") === "boardgamedesigner").map(l => l.getAttribute("value"));
  const weight = item.getElementsByTagName("averageweight")[0]?.getAttribute("value");
  const bggImage = getTxt("image");
  const rawDescription = getTxt("description");
  const summary = rawDescription
    ? rawDescription.split(/\n\s*\n|\r\n\r\n/).map(p => `<p>${p.trim()}</p>`).join("")
    : "";
  return {
    bggId, name: nameEl?.getAttribute("value") || "Unbekannt", year: getAttr("yearpublished"),
    images: bggImage ? [bggImage] : [], minPlayers: getAttr("minplayers"), maxPlayers: getAttr("maxplayers"),
    minTime: getAttr("minplaytime"), maxTime: getAttr("maxplaytime"), age: getAttr("minage"),
    publishers, designers, mechanisms, categories, summary,
    complexity: weight ? Math.round(parseFloat(weight) * 10) / 10 : null,
  };
}

            <button type="button" onClick={() => setPickerOpen("designers")}

                <input value={form.maxPlayers} onChange={(e) => update("maxPlayers", e.target.value)} placeholder="max" inputMode="numeric"

            </div>
            <input value={form.bestPlayers} onChange={(e) => update("bestPlayers", e.target.value)} placeholder="Beste Spieleranzahl (optional)" inputMode="numeric"

            <div>
              <label className="text-[11px] text-[#5C574F]">Dauer in Minuten (min–max)</label>
              <div className="flex items-center gap-2 mt-1.5">
                <input value={form.minTime} onChange={(e) => update("minTime", e.target.value)} placeholder="min" inputMode="numeric"
                  className={`w-full h-12 border border-[#3A3631] rounded-[14px] px-3.5 text-[#F2EDE4] text-base text-center ${form.minTime ? "bg-[#262422]" : "bg-transparent"}`} />
                <span className="shrink-0 text-[#5C574F]">–</span>
                <input value={form.maxTime} onChange={(e) => update("maxTime", e.target.value)} placeholder="max" inputMode="numeric"
                  className={`w-full h-12 border border-[#3A3631] rounded-[14px] px-3.5 text-[#F2EDE4] text-base text-center ${form.maxTime ? "bg-[#262422]" : "bg-transparent"}`} />
              </div>
            </div>
            <div>
              <label className="text-[11px] text-[#5C574F]">Komplexität</label>
              <div className="mt-1.5">
                <ComplexityPicker value={form.complexity} onChange={(v) => update("complexity", v)} />
              </div>
              {complexityLabel(form) && <p className="text-xs text-[#5C574F] mt-1.5">→ {complexityLabel(form)}</p>}
            </div>

            <button type="button" onClick={() => setPickerOpen("mechanisms")}
              className={`w-full min-h-[48px] border rounded-[14px] pl-3.5 pr-3 py-2 text-left flex items-center gap-1.5 ${form.mechanisms.length ? "bg-[#262422] border-[#3A3631]" : "bg-transparent border-[#3A3631] text-[#5C574F] text-base"}`}>
              <span className="flex-1 min-w-0 flex flex-wrap gap-1.5 items-center">
                {form.mechanisms.length ? form.mechanisms.map((m) => {
                  const MIcon = tagIcon(m);
                  return <Pill key={m}><MIcon size={10} className="inline -mt-0.5 mr-0.5" />{m}</Pill>;
                }) : "Mechanismen auswählen…"}
              </span>
              <ChevronDown size={16} className="shrink-0 text-[#5C574F]" />
            </button>
            <button type="button" onClick={() => setPickerOpen("categories")}
              className={`w-full min-h-[48px] border rounded-[14px] pl-3.5 pr-3 py-2 text-left flex items-center gap-1.5 ${form.categories.length ? "bg-[#262422] border-[#3A3631]" : "bg-transparent border-[#3A3631] text-[#5C574F] text-base"}`}>
              <span className="flex-1 min-w-0 flex flex-wrap gap-1.5 items-center">
                {form.categories.length ? form.categories.map((c) => {
                  const CIcon = tagIcon(c);
                  return <Pill key={c}><CIcon size={10} className="inline -mt-0.5 mr-0.5" />{c}</Pill>;
                }) : "Kategorien auswählen…"}
              </span>
              <ChevronDown size={16} className="shrink-0 text-[#5C574F]" />
            </button>
            <button type="button" onClick={() => setPickerOpen("playerTypes")}
              className={`w-full min-h-[48px] border rounded-[14px] pl-3.5 pr-3 py-2 text-left flex items-center gap-1.5 ${form.playerTypes.length ? "bg-[#262422] border-[#3A3631]" : "bg-transparent border-[#3A3631] text-[#5C574F] text-base"}`}>
              <span className="flex-1 min-w-0 flex flex-wrap gap-1.5 items-center">
                {form.playerTypes.length ? form.playerTypes.map((t) => <Pill key={t}>{t}</Pill>) : "Spielertyp auswählen…"}
              </span>
              <ChevronDown size={16} className="shrink-0 text-[#5C574F]" />
            </button>

            <Segmented
              options={[{ v: "owned", label: "Besitz" }, { v: "wishlist", label: "Wunschliste" }, { v: "none", label: "Nur gespielt" }]}
              value={form.status}
              onChange={(v) => update("status", v)}
            />

            <button type="button" onClick={() => update("isCampaign", !form.isCampaign)}
              className={`w-full h-12 flex items-center justify-between px-3.5 rounded-[14px] border ${form.isCampaign ? "bg-[#6C7FE0]/15 border-[#6C7FE0]/40" : "bg-transparent border-[#3A3631]"}`}>
              <span className={`text-sm ${form.isCampaign ? "text-[#F2EDE4]" : "text-[#5C574F]"}`}>Kampagnenspiel (Fortschritts-Historie)</span>
              <div className={`w-10 h-6 rounded-full flex items-center px-0.5 transition-colors ${form.isCampaign ? "bg-[#6C7FE0] justify-end" : "bg-[#3A3631] justify-start"}`}>
                <div className="w-5 h-5 rounded-full bg-[#F2EDE4]" />
              </div>
            </button>

            <div>
              <label className="text-[11px] text-[#5C574F]">Deine Bewertung</label>
              <div className="mt-1.5">
                <StarRating value={form.rating} onChange={(v) => update("rating", v)} />
              </div>
            </div>

            <div>
              <label className="text-[11px] text-[#5C574F]">Notizen, Hausregeln</label>
              <div className="mt-1.5">
                <RichTextEditor value={form.notes} onChange={(html) => update("notes", html)} placeholder="Notizen, Hausregeln…" />
              </div>
            </div>
          </div>
        )}
        {step === "manual" && (
          <div className="shrink-0 border-t border-[#3A3631] p-4 space-y-2">
            <button disabled={!form.name.trim()} onClick={() => onSave(form)}
              className="w-full bg-[#6C7FE0] disabled:opacity-40 text-[#F2EDE4] rounded-[14px] py-3 font-medium active:scale-[0.99] flex items-center justify-center gap-2">
              <Check size={18} /> Speichern
            </button>
            {initial && (
              <button onClick={() => onDelete(initial.id)} className="w-full text-[#C1443C] text-sm font-body py-2 flex items-center justify-center gap-1.5">
                <Trash2 size={14} /> Spiel entfernen
              </button>
            )}
          </div>
        )}
      </div>
      {pickerOpen === "mechanisms" && (
        <TagPickerModal
          title="Mechanismen"
          options={mechanismOptions}
          selected={form.mechanisms}
          onToggle={(v) => update("mechanisms", form.mechanisms.includes(v) ? form.mechanisms.filter((x) => x !== v) : [...form.mechanisms, v])}
          onAddCustom={onAddMechanism}
          onClose={() => setPickerOpen(null)}
          descriptions={MECHANISM_DESCRIPTIONS}
        />
      )}
      {pickerOpen === "categories" && (
        <TagPickerModal
          title="Kategorien"
          options={categoryOptions}
          selected={form.categories}
          onToggle={(v) => update("categories", form.categories.includes(v) ? form.categories.filter((x) => x !== v) : [...form.categories, v])}
          onAddCustom={onAddCategory}
          onClose={() => setPickerOpen(null)}
          descriptions={CATEGORY_DESCRIPTIONS}
        />
      )}
      {pickerOpen === "publishers" && (
        <TagPickerModal
          title="Verlag"
          options={publisherOptions}
          selected={form.publishers}
          onToggle={(v) => update("publishers", form.publishers.includes(v) ? form.publishers.filter((x) => x !== v) : [...form.publishers, v])}
          onAddCustom={() => {}}
          onClose={() => setPickerOpen(null)}
          showIcons={false}
        />
      )}
      {pickerOpen === "designers" && (
        <TagPickerModal
          title="Designer"
          options={designerOptions}
          selected={form.designers}
          onToggle={(v) => update("designers", form.designers.includes(v) ? form.designers.filter((x) => x !== v) : [...form.designers, v])}
          onAddCustom={() => {}}
          onClose={() => setPickerOpen(null)}
          showIcons={false}
        />
      )}
      {pickerOpen === "playerTypes" && (
        <TagPickerModal
          title="Spielertyp"
          options={playerTypeOptions}
          selected={form.playerTypes}
          onToggle={(v) => update("playerTypes", form.playerTypes.includes(v) ? form.playerTypes.filter((x) => x !== v) : [...form.playerTypes, v])}
          onAddCustom={onAddPlayerType}
          onClose={() => setPickerOpen(null)}
          showIcons={false}
          descriptions={{ ...PLAYER_TYPE_DESCRIPTIONS, ...customPlayerTypeDescriptions }}
        />
      )}
    </div>
  );
}

/* ---------------- ADD PLAY MODAL ---------------- */
function PlayFormModal({ games, plays, playerProfiles, onAddPlayer, onUpdatePlayerPhoto, initial, onClose, onSave, onDelete }) {
  const [gameQuery, setGameQuery] = useState("");
  const [selectedGame, setSelectedGame] = useState(() =>
    initial ? (games.find(g => g.id === initial.gameId) || { id: initial.gameId, name: initial.gameName }) : null
  );
  const [mode, setMode] = useState(initial ? initial.mode : "physical-owned");
  const [playerIds, setPlayerIds] = useState(initial ? initial.playerIds || [] : []);
  const [newPlayerOpen, setNewPlayerOpen] = useState(false);
  const [newPlayerName, setNewPlayerName] = useState("");
  const [newPlayerPhotoFor, setNewPlayerPhotoFor] = useState(null);
  const togglePlayerId = (id) => setPlayerIds((prev) => (prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]));
  const knownPlayers = useMemo(() => {
    const set = new Set();
    (plays || []).forEach((p) => (p.players || "").split(",").map((n) => n.trim()).filter(Boolean).forEach((n) => set.add(n)));
    return Array.from(set).sort();
  }, [plays]);
  const addPlayerName = (name) => {
    const current = players.split(",").map((n) => n.trim()).filter(Boolean);
    if (current.includes(name)) return;
    setPlayers(current.length ? `${current.join(", ")}, ${name}` : name);
  };
  const [date, setDate] = useState(initial ? initial.date : new Date().toISOString().slice(0, 10));
  const [players, setPlayers] = useState(initial ? initial.players || "" : "");
  const [winner, setWinner] = useState(initial ? initial.winner || "" : "");
  const [notes, setNotes] = useState(initial ? initial.notes || "" : "");
  const [images, setImages] = useState(initial ? initial.images || [] : []);

  const filtered = gameQuery ? games.filter(g => g.name.toLowerCase().includes(gameQuery.toLowerCase())) : games.slice(0, 6);

  const save = () => {
    if (!selectedGame) return;
    const profileNames = playerIds.map((id) => (playerProfiles.find((p) => p.id === id) || {}).name).filter(Boolean);
    const mergedPlayers = [...new Set([...profileNames, ...players.split(",").map((n) => n.trim()).filter(Boolean)])].join(", ");
    onSave({ id: initial ? initial.id : uid(), gameId: selectedGame.id, gameName: selectedGame.name, date, mode, players: mergedPlayers, playerIds, winner, notes, images });
  };

  return (
    <div className="fixed top-0 left-0 right-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-0 sm:p-6" style={{ height: "var(--app-height, 100dvh)" }}>
      <div onFocus={handleFocusScroll} className="bg-[#1C1B1A] border border-[#3A3631] rounded-t-2xl sm:rounded-2xl w-full sm:max-w-lg max-h-[var(--app-height,100dvh)] flex flex-col overflow-hidden rise-in font-body">
        <div className="shrink-0 bg-[#1C1B1A] border-b border-[#3A3631] px-5 py-4 flex items-center justify-between">
          <h2 className="font-display text-xl text-[#F2EDE4]">{initial ? "Partie bearbeiten" : "Partie eintragen"}</h2>
          <button onClick={onClose} className="text-[#A39C8F] p-1"><X size={22} /></button>
        </div>
        <div className="p-5 space-y-4 overflow-y-auto flex-1">
          {!selectedGame ? (
            <div>
              <input value={gameQuery} onChange={(e) => setGameQuery(e.target.value)} placeholder="Spiel suchen…"
                className="w-full bg-[#262422] border border-[#3A3631] rounded-[14px] px-4 py-3 text-[#F2EDE4] placeholder-[#5C574F] focus:outline-none focus:border-[#D4A24C]" />
              <div className="mt-3 space-y-2">
                {filtered.map((g) => (
                  <button key={g.id} onClick={() => setSelectedGame(g)}
                    className="w-full text-left bg-[#262422] hover:bg-[#2E2B28] border border-[#3A3631] rounded-[14px] px-4 py-2.5 flex items-center gap-3">
                    <Cover game={g} size="sm" /><span className="text-[#F2EDE4]">{g.name}</span>
                  </button>
                ))}
                {filtered.length === 0 && (
                  <p className="text-sm text-[#5C574F] px-1">Nicht in deiner Liste? Lege es erst kurz über „Spiel hinzufügen" in der Sammlung an — auch ungespielt, ohne Besitz.</p>
                )}
              </div>
            </div>
          ) : (
            <>
              <div className="flex items-center gap-3 bg-[#262422] border border-[#3A3631] rounded-[14px] px-4 py-3">
                <Cover game={selectedGame} size="sm" />
                <span className="text-[#F2EDE4] font-medium flex-1 min-w-0 truncate">{selectedGame.name}</span>
                <button onClick={() => setSelectedGame(null)} className="text-[#5C574F] text-xs shrink-0">Ändern</button>
              </div>
              <Segmented
                options={[{ v: "physical-owned", label: "Eigene Sammlung", icon: Home }, { v: "physical-other", label: "Geliehen / Event", icon: Sofa }, { v: "bga", label: "BoardGameArena", icon: Globe }]}
                value={mode}
                onChange={setMode}
              />
              <div>
                <label className="text-[11px] text-[#5C574F]">Datum</label>
                <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-auto min-w-[180px] h-12 bg-[#262422] border border-[#3A3631] rounded-[14px] px-3.5 text-[#F2EDE4] text-base mt-1.5" />
              </div>
              <div>
                <label className="text-[11px] text-[#5C574F]">Mitspieler</label>
                <div className="flex items-center gap-3 overflow-x-auto pb-1 mt-1.5">
                  {playerProfiles.map((p) => {
                    const selected = playerIds.includes(p.id);
                    return (
                      <div key={p.id} className="shrink-0 flex flex-col items-center gap-1 w-16">
                        <button type="button" onClick={() => togglePlayerId(p.id)} onContextMenu={(e) => e.preventDefault()}
                          className="relative w-14 h-14 rounded-full overflow-hidden border-2" style={{ borderColor: selected ? "#6C7FE0" : "#3A3631" }}>
                          {p.photo ? (
                            <img src={p.photo} alt={p.name} className="w-full h-full block object-cover" />
                          ) : (
                            <div className="w-full h-full bg-[#262422] flex items-center justify-center text-[#A39C8F] font-display text-lg">{p.name.charAt(0).toUpperCase()}</div>
                          )}
                          {selected && <div className="absolute inset-0 bg-[#6C7FE0]/25 flex items-center justify-center"><Check size={18} className="text-white" /></div>}
                        </button>
                        <button type="button" onClick={() => setNewPlayerPhotoFor(p.id)} className="text-[10px] text-[#5C574F] truncate w-full text-center">{p.name}</button>
                      </div>
                    );
                  })}
                  <button type="button" onClick={() => setNewPlayerOpen(true)} className="shrink-0 w-14 h-14 rounded-full border-2 border-dashed border-[#3A3631] flex items-center justify-center text-[#5C574F]">
                    <Plus size={18} />
                  </button>
                </div>
              </div>
              <input value={players} onChange={(e) => setPlayers(e.target.value)} placeholder="Weitere Mitspieler (Freitext, optional)"
                className={`w-full h-12 border border-[#3A3631] rounded-[14px] px-3.5 text-[#F2EDE4] text-base focus:outline-none focus:border-[#6C7FE0] ${players ? "bg-[#262422]" : "bg-transparent"}`} />
              {knownPlayers.length > 0 && (
                <div className="flex gap-1.5 overflow-x-auto pb-1 -mt-1.5">
                  {knownPlayers.filter((n) => !players.split(",").map((x) => x.trim()).includes(n)).map((n) => (
                    <button key={n} type="button" onClick={() => addPlayerName(n)} className="shrink-0 px-2.5 py-1 rounded-full text-xs bg-[#262422] border border-[#3A3631] text-[#A39C8F]">+ {n}</button>
                  ))}
                </div>
              )}
              <input value={winner} onChange={(e) => setWinner(e.target.value)} placeholder="Gewinner (optional)"
                className={`w-full h-12 border border-[#3A3631] rounded-[14px] px-3.5 text-[#F2EDE4] text-base focus:outline-none focus:border-[#6C7FE0] ${winner ? "bg-[#262422]" : "bg-transparent"}`} />
              <textarea value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Notiz (optional)" rows={2}
                className={`w-full border border-[#3A3631] rounded-[14px] px-3.5 py-3 text-[#F2EDE4] text-base focus:outline-none focus:border-[#6C7FE0] ${notes ? "bg-[#262422]" : "bg-transparent"}`} />
              <div>
                <label className="text-[11px] text-[#5C574F]">Fotos</label>
                <div className="mt-1.5">
                  <PhotoGallerySection
                    images={images}
                    onAdd={(img) => setImages((prev) => [...prev, img])}
                    onRemove={(i) => setImages((prev) => prev.filter((_, idx) => idx !== i))}
                  />
                </div>
              </div>
            </>
          )}
        </div>
        {selectedGame && (
          <div className="shrink-0 border-t border-[#3A3631] p-4 space-y-2">
            <button onClick={save} className="w-full bg-[#6C7FE0] text-[#F2EDE4] rounded-[14px] py-3 font-medium active:scale-[0.99] flex items-center justify-center gap-2">
              <Check size={18} /> Partie speichern
            </button>
            {initial && (
              <button onClick={() => onDelete(initial.id)} className="w-full text-[#C1443C] text-sm font-body py-2 flex items-center justify-center gap-1.5">
                <Trash2 size={14} /> Partie löschen
              </button>
            )}
          </div>
        )}
      </div>
      {newPlayerOpen && (
        <div className="fixed top-0 left-0 right-0 bg-black/70 z-[65] flex items-end sm:items-center justify-center p-0 sm:p-6" style={{ height: "var(--app-height, 100dvh)" }} onClick={() => setNewPlayerOpen(false)}>
          <div className="bg-[#1C1B1A] border border-[#3A3631] rounded-t-2xl sm:rounded-2xl w-full sm:max-w-sm rise-in font-body p-5 space-y-3" onClick={(e) => e.stopPropagation()}>
            <h3 className="font-display text-lg text-[#F2EDE4]">Neuer Mitspieler</h3>
            <input onFocus={handleFocusScroll} value={newPlayerName} onChange={(e) => setNewPlayerName(e.target.value)} placeholder="Name"

}

const DEFAULT_DASHBOARD_ORDER = ["nudge", "month", "achievements", "records", "bestof", "wishlist", "topRated", "dust", "digital"];

function DashboardReorderScreen({ order, sections, labels, onSave, onClose }) {
  const [items, setItems] = useState(order.filter((key) => sections[key]));
  const dragIndex = React.useRef(null);
  const [draggingKey, setDraggingKey] = useState(null);
  const itemRefs = React.useRef({});

  const moveItem = (from, to) => {
    setItems((prev) => {
      const next = [...prev];
      const [moved] = next.splice(from, 1);
      next.splice(to, 0, moved);
      return next;
    });
  };

  const handleTouchStart = (idx) => {
    dragIndex.current = idx;
    setDraggingKey(items[idx]);
  };
  const handleTouchMove = (e) => {
    if (dragIndex.current === null) return;
    const touchY = e.touches[0].clientY;
    items.forEach((key, idx) => {
      if (idx === dragIndex.current) return;
      const el = itemRefs.current[key];
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      if ((touchY < mid && idx < dragIndex.current) || (touchY > mid && idx > dragIndex.current)) {
        moveItem(dragIndex.current, idx);
        dragIndex.current = idx;
      }
    });
  };
  const handleTouchEnd = () => {
    dragIndex.current = null;
    setDraggingKey(null);
  };

  return (
    <div className="fixed inset-0 z-[80] bg-[#1C1B1A] flex flex-col">
      <div className="shrink-0 border-b border-[#3A3631] px-5 flex items-center justify-between" style={{ paddingTop: "max(1rem, env(safe-area-inset-top))", paddingBottom: "1rem" }}>
        <button onClick={onClose} className="text-[#A39C8F] p-1" aria-label="Abbrechen"><ChevronLeft size={22} /></button>
        <h2 className="font-display text-xl text-[#F2EDE4]">Neu anordnen</h2>
        <button onClick={() => onSave(items)} className="text-[#6C7FE0] text-sm font-medium px-2 py-1">Fertig</button>
      </div>
      <p className="shrink-0 text-xs text-[#5C574F] px-5 pt-3 pb-1">Am Griff-Symbol ziehen, um die Reihenfolge zu ändern.</p>
      <div className="flex-1 overflow-y-auto p-4 space-y-2" style={{ touchAction: draggingKey ? "none" : "auto" }}>
        {items.map((key, idx) => (
          <div
            key={key}
            ref={(el) => { itemRefs.current[key] = el; }}
            className="flex items-center gap-3 bg-[#262422] border rounded-[14px] px-3.5 h-14"
            style={{
              borderColor: draggingKey === key ? "#6C7FE0" : "#3A3631",
              transform: draggingKey === key ? "scale(1.03)" : "none",
              boxShadow: draggingKey === key ? "0 8px 20px rgba(0,0,0,0.4)" : "none",
              zIndex: draggingKey === key ? 10 : 1,
              transition: "border-color .15s, transform .15s, box-shadow .15s",
            }}
          >
            <span className="text-sm text-[#F2EDE4] flex-1">{labels[key] || key}</span>
            <div
              className="text-[#5C574F] p-2 -mr-2"
              onTouchStart={() => handleTouchStart(idx)}
              onTouchMove={handleTouchMove}
              onTouchEnd={handleTouchEnd}
            >
              <GripVertical size={18} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Dashboard({ games, plays, onQuickFilter, onView, sectionOrder, onReorder, onSearch }) {
  const owned = games.filter(g => g.status === "owned");
  const playCounts = useMemo(() => {
    const map = {}; plays.forEach(p => { map[p.gameId] = (map[p.gameId] || 0) + 1; }); return map;
  }, [plays]);
  const lastPlays = [...plays].sort((a, b) => (b.date || "").localeCompare(a.date || "")).slice(0, 6);
  const dustCollectors = owned.filter(g => !playCounts[g.id]).sort((a, b) => (a.addedDate || "").localeCompare(b.addedDate || "")).slice(0, 6);
  const topRated = [...owned].filter(g => g.rating).sort((a, b) => parseInt(b.rating) - parseInt(a.rating)).slice(0, 10);
  const complexGames = owned.filter(g => g.complexity);
  const avgComplexity = complexGames.length ? (complexGames.reduce((s, g) => s + parseFloat(g.complexity), 0) / complexGames.length).toFixed(1) : "—";
  const thirtyDaysAgo = new Date(); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
  const recentPlayCounts = {};
  plays.forEach(p => { if (p.date && new Date(p.date) >= thirtyDaysAgo) recentPlayCounts[p.gameId] = (recentPlayCounts[p.gameId] || 0) + 1; });
  const topMonth = Object.entries(recentPlayCounts).sort((a, b) => b[1] - a[1])[0];
  const topMonthGame = topMonth ? games.find(g => g.id === topMonth[0]) : null;
  const digitalCount = plays.filter(p => p.mode === "bga").length;
  const physicalCount = plays.filter(p => p.mode !== "bga").length;
  const genreMix = useMemo(() => {
    const tally = {};
    owned.forEach(g => (g.categories || []).forEach(c => { tally[c] = (tally[c] || 0) + 1; }));
    return Object.entries(tally).sort((a, b) => b[1] - a[1]).slice(0, 7);
  }, [owned]);
  const findGame = (id) => games.find(g => g.id === id);

  const mostPlayed = useMemo(() => {
    const entries = Object.entries(playCounts).sort((a, b) => b[1] - a[1])[0];
    return entries ? { game: findGame(entries[0]), count: entries[1] } : null;
  }, [playCounts, games]);

  // Echte persönliche Rekorde aus dem tatsächlichen Spielverhalten — jeder erscheint erst, wenn er wirklich erreicht wurde.
  const bestDay = useMemo(() => {
    const tally = {};
    plays.forEach(p => { if (p.date) tally[p.date] = (tally[p.date] || 0) + 1; });
    const entry = Object.entries(tally).sort((a, b) => b[1] - a[1])[0];
    return entry && entry[1] >= 2 ? { date: entry[0], count: entry[1] } : null;
  }, [plays]);
  const bestStreak = useMemo(() => {
    const dates = [...new Set(plays.map(p => p.date).filter(Boolean))].sort();
    let best = 1, cur = 1;
    for (let i = 1; i < dates.length; i++) {
      const diff = (new Date(dates[i]) - new Date(dates[i - 1])) / 86400000;
      cur = diff === 1 ? cur + 1 : 1;
      best = Math.max(best, cur);
    }
    return dates.length && best >= 2 ? best : null;
  }, [plays]);
  const biggestPlayGroup = useMemo(() => {
    const sizes = plays.map(p => (p.players || "").split(",").map(s => s.trim()).filter(Boolean).length).filter(n => n > 0);
    const max = sizes.length ? Math.max(...sizes) : 0;
    return max >= 2 ? max : null;
  }, [plays]);

  const wishlist = games.filter(g => g.status === "wishlist").slice(0, 6);

  // Best-of: abgeleitet aus tatsächlich gespielten Partien, nicht nur aus der Sammlung.
  const bestOf = useMemo(() => {
    if (plays.length === 0) return null;
    const thisYear = new Date().getFullYear();
    const yearPlayCounts = {};
    plays.forEach(p => { if (p.date && new Date(p.date).getFullYear() === thisYear) yearPlayCounts[p.gameId] = (yearPlayCounts[p.gameId] || 0) + 1; });
    const topYearEntry = Object.entries(yearPlayCounts).sort((a, b) => b[1] - a[1])[0];
    const topYear = topYearEntry ? { game: findGame(topYearEntry[0]), count: topYearEntry[1] } : null;

    const playerCountTally = {};
    plays.forEach(p => { const n = (p.players || "").split(",").map(s => s.trim()).filter(Boolean).length; if (n > 0) playerCountTally[n] = (playerCountTally[n] || 0) + 1; });
    const favCountEntry = Object.entries(playerCountTally).sort((a, b) => b[1] - a[1])[0];

    const playedGameIds = [...new Set(plays.map(p => p.gameId))];
    const playedGames = playedGameIds.map(id => games.find(g => g.id === id)).filter(Boolean);
    const catTally = {}, mechTally = {};
    playedGames.forEach(g => {
      const count = plays.filter(p => p.gameId === g.id).length;
      (g.categories || []).forEach(c => { catTally[c] = (catTally[c] || 0) + count; });
      (g.mechanisms || []).forEach(m => { mechTally[m] = (mechTally[m] || 0) + count; });
    });
    const favCat = Object.entries(catTally).sort((a, b) => b[1] - a[1])[0];
    const favMech = Object.entries(mechTally).sort((a, b) => b[1] - a[1])[0];

    let complexitySum = 0, complexityCount = 0;
    playedGames.forEach(g => { if (g.complexity) { const c = plays.filter(p => p.gameId === g.id).length; complexitySum += parseFloat(g.complexity) * c; complexityCount += c; } });
    const avgPlayedComplexity = complexityCount ? complexitySum / complexityCount : null;
    const complexityLabelFromValue = avgPlayedComplexity == null ? null : avgPlayedComplexity < 2 ? "Familienspiel" : avgPlayedComplexity < 3.5 ? "Kennerspiel" : "Expertenspiel";

    return { topYear, favCount: favCountEntry ? { count: favCountEntry[0], times: favCountEntry[1] } : null, favCat, favMech, complexityLabel: complexityLabelFromValue, avgPlayedComplexity };
  }, [plays, games]);

  // Erfolge: rein aus vorhandenen Daten berechnet, kein zusätzlicher Speicherzustand nötig.
  const distinctPlayedGames = new Set(plays.map(p => p.gameId)).size;
  const distinctPlayedCategories = new Set(owned.filter(g => plays.some(p => p.gameId === g.id)).flatMap(g => g.categories || [])).size;
  const seriesCount = mostPlayed ? mostPlayed.count : 0;
  const allRated = owned.length > 0 && owned.every(g => g.rating);
  const campaignMastery = games.some(g => g.isCampaign && plays.filter(p => p.gameId === g.id).length >= 3);
  const achievements = [
    { id: "first", label: "Erste Partie", emoji: "🎉", unlocked: plays.length >= 1 },
    { id: "many", label: "Vielspieler", emoji: "🔥", unlocked: plays.length >= 10 },
    { id: "pro", label: "Spielprofi", emoji: "🏅", unlocked: plays.length >= 50 },
    { id: "collector", label: "Sammler", emoji: "📚", unlocked: owned.length >= 10 },
    { id: "megacollector", label: "Großsammler", emoji: "🏛️", unlocked: owned.length >= 25 },
    { id: "series", label: "Serientäter", emoji: "🔁", unlocked: seriesCount >= 5 },
    { id: "explorer", label: "Genre-Entdecker", emoji: "🧭", unlocked: distinctPlayedCategories >= 5 },
    { id: "variety", label: "Vielfalt", emoji: "🎨", unlocked: distinctPlayedGames >= 10 },
    { id: "campaign", label: "Kampagnen-Meister", emoji: "🗺️", unlocked: campaignMastery },
    { id: "rated", label: "Perfektionist", emoji: "⭐", unlocked: allRated },
  ].sort((a, b) => (b.unlocked === a.unlocked ? 0 : b.unlocked ? 1 : -1));

  // Kontextuelle Vorschläge: das am längsten wartende Spiel mit einer kleinen freundlichen Nachricht.
  const nudge = useMemo(() => {
    if (dustCollectors.length > 0) {
      const g = dustCollectors[0];
      const days = g.addedDate ? Math.floor((Date.now() - new Date(g.addedDate)) / 86400000) : null;
      return { game: g, text: days !== null && days > 0 ? `wartet seit ${days} Tagen — heute spielen?` : "wartet auf die erste Partie — heute spielen?" };
    }
    const stale = owned.filter(g => playCounts[g.id]).map(g => {
      const gp = plays.filter(p => p.gameId === g.id).sort((a, b) => (b.date || "").localeCompare(a.date || ""));
      return { g, last: gp[0] ? gp[0].date : null };
    }).filter(x => x.last).sort((a, b) => a.last.localeCompare(b.last));
    if (stale.length > 0) {
      const days = Math.floor((Date.now() - new Date(stale[0].last)) / 86400000);
      if (days >= 21) return { game: stale[0].g, text: `zuletzt vor ${days} Tagen gespielt — mal wieder Zeit?` };
    }
    return null;
  }, [dustCollectors, owned, plays, playCounts]);

  const sections = {
    month: topMonthGame && (
      <button key="month" onClick={() => onView(topMonthGame)} className="w-full text-left bg-[#262422] border border-[#3A3631] rounded-xl px-3.5 py-2.5 flex items-center gap-2.5">
        <Cover game={topMonthGame} size="sm" />
        <div className="min-w-0 flex-1">
          <p className="text-[#5C574F] text-[10px] font-body flex items-center gap-1"><TrendingUp size={10} /> Spiel des Monats</p>
          <p className="text-[#F2EDE4] font-body text-sm font-medium truncate">{topMonthGame.name} <span className="text-[#5C574F] font-normal">· {topMonth[1]}× diesen Monat</span></p>
        </div>
      </button>
    ),
    nudge: nudge && (
      <button key="nudge" onClick={() => onView(nudge.game)}
        className="relative w-full text-left rounded-3xl p-5 flex items-center gap-4 overflow-hidden border border-[#6C7FE0]/30"
        style={{ backgroundImage: "radial-gradient(circle at 15% 20%, rgba(108,127,224,0.28), transparent 65%), linear-gradient(135deg, #262422, #1C1B1A)" }}>
        <Cover game={nudge.game} size="lg" className="!w-24 !h-24 shrink-0" />
        <div className="min-w-0">
          <p className="text-[#8B9AFA] text-xs font-body font-semibold flex items-center gap-1.5 mb-1"><Sparkles size={14} /> VORSCHLAG FÜR HEUTE</p>
          <p className="text-[#F2EDE4] font-display text-2xl leading-tight truncate">{nudge.game.name}</p>
          <p className="text-[#A39C8F] text-sm font-body mt-0.5">{nudge.text}</p>
        </div>
      </button>
    ),
    achievements: (
      <div key="achievements">

          <div className="h-full" style={{ width: `${(digitalCount / plays.length) * 100}%`, background: "linear-gradient(90deg, #3F7A6E, #6FBBA9)" }} />

          {sortMenuOpen && (

/* ---------------- LIST DETAIL PAGE (view/add/remove games, delete the list) ---------------- */
function ListDetailModal({ list, games, plays, onClose, onView, onDeleteList, onToggleGame, demoMode }) {
  const [addOpen, setAddOpen] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [contextGame, setContextGame] = useState(null);
  const longPressTimer = React.useRef(null);
  const longPressFired = React.useRef(false);
  const listGames = list.gameIds.map((id) => games.find((g) => g.id === id)).filter(Boolean);
  const playCounts = useMemo(() => {
    const map = {}; plays.forEach((p) => { map[p.gameId] = (map[p.gameId] || 0) + 1; }); return map;
  }, [plays]);
  const startLongPress = (g) => {
    if (demoMode) return;
    longPressFired.current = false;
    longPressTimer.current = setTimeout(() => { longPressFired.current = true; setContextGame(g); }, 500);
  };
  const cancelLongPress = () => { if (longPressTimer.current) clearTimeout(longPressTimer.current); };

  return (
    <div className="fixed inset-0 z-[55] bg-[#1C1B1A]">
      <div className="w-full h-full max-w-3xl mx-auto flex flex-col overflow-hidden">
        <div className="shrink-0 border-b border-[#3A3631] px-5 flex items-center justify-between" style={{ paddingTop: "max(1rem, env(safe-area-inset-top))", paddingBottom: "1rem" }}>
          <button onClick={onClose} className="text-[#A39C8F] p-1" aria-label="Zurück"><ChevronLeft size={22} /></button>
          <h2 className="font-display text-xl text-[#F2EDE4] truncate px-2">{list.name}</h2>
          {!demoMode ? (
            <button onClick={() => setConfirmDelete(true)} className="text-[#C1443C] p-1.5 bg-[#262422] border border-[#3A3631] rounded-full" aria-label="Liste löschen"><Trash2 size={16} /></button>
          ) : <span className="w-8" />}
        </div>
        {confirmDelete && (
          <div className="shrink-0 bg-[#C1443C]/15 border-b border-[#C1443C]/30 px-5 py-3 flex items-center justify-between gap-3">
            <p className="text-sm text-[#F2EDE4]">Liste "{list.name}" wirklich löschen?</p>
            <div className="flex gap-2 shrink-0">
              <button onClick={() => setConfirmDelete(false)} className="h-9 px-3 rounded-lg bg-[#262422] border border-[#3A3631] text-[#F2EDE4] text-xs">Abbrechen</button>
              <button onClick={() => { onDeleteList(list.id); onClose(); }} className="h-9 px-3 rounded-lg bg-[#C1443C] text-[#F2EDE4] text-xs font-medium">Löschen</button>
            </div>
          </div>
        )}
        <div className="flex-1 overflow-y-auto p-5">
          {!demoMode && (
            <button onClick={() => setAddOpen(true)} className="w-full h-12 mb-4 flex items-center justify-center gap-2 bg-[#6C7FE0] text-[#F2EDE4] rounded-[14px] font-medium">
              <Plus size={16} /> Spiele hinzufügen
            </button>
          )}
          {listGames.length === 0 ? (
            <p className="text-[#5C574F] text-sm text-center mt-8">Noch keine Spiele in dieser Liste.</p>
          ) : (
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
              {listGames.map((g) => (
                <button
                  key={g.id}
                  onClick={() => { if (longPressFired.current) { longPressFired.current = false; return; } onView(g); }}
                  onTouchStart={() => startLongPress(g)}
                  onTouchEnd={cancelLongPress}
                  onTouchMove={cancelLongPress}
                  className="text-left bg-[#262422] border border-[#3A3631] rounded-2xl p-3 flex flex-col"
                >
                  <Cover game={g} size="lg" />
                  <p className="font-body text-[#F2EDE4] text-sm font-medium mt-2 leading-tight truncate">{g.name}</p>
                  <div className="flex items-center gap-1.5 mt-1.5 flex-wrap">
                    {g.minPlayers && <span className="flex items-center gap-0.5 text-[10px] text-[#A39C8F] font-mono"><Users size={10} /> {g.minPlayers}-{g.maxPlayers}</span>}
                    {!playCounts[g.id] && g.status === "owned" && <Pill tone="amber">ungespielt</Pill>}
                  </div>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
      {addOpen && (
        <AddGamesToListModal games={games} list={list} onToggle={(gameId) => onToggleGame(list.id, gameId)} onClose={() => setAddOpen(false)} />
      )}
      {contextGame && (
        <div className="fixed top-0 left-0 right-0 bg-black/70 z-[66] flex items-end sm:items-center justify-center p-0 sm:p-6" style={{ height: "var(--app-height, 100dvh)" }} onClick={() => setContextGame(null)}>
          <div className="bg-[#1C1B1A] border border-[#3A3631] rounded-t-2xl sm:rounded-2xl w-full sm:max-w-sm rise-in font-body p-5 space-y-2" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center gap-3 pb-3 mb-1 border-b border-[#3A3631]">
              <Cover game={contextGame} size="sm" />
              <span className="text-[#F2EDE4] font-medium truncate">{contextGame.name}</span>
            </div>
            <button onClick={() => { onToggleGame(list.id, contextGame.id); setContextGame(null); }} className="w-full h-12 flex items-center gap-3 px-3.5 bg-[#262422] border border-[#3A3631] rounded-[14px] text-[#C1443C] text-sm">
              <X size={16} /> Aus Liste entfernen
            </button>
            <button onClick={() => setContextGame(null)} className="w-full text-center py-2 text-[#A39C8F] text-sm">Abbrechen</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------- COMMAND BAR (Schnellsuche über Spiele, Partien, Listen) ---------------- */
function CommandBarModal({ games, plays, lists, onClose, onOpenGame, onOpenList, onGoToPlaylog }) {
  const [query, setQuery] = useState("");
  const q = query.trim().toLowerCase();

  const listResults = q ? lists.filter((l) => l.name.toLowerCase().includes(q)).slice(0, 4) : [];
  const playResults = q ? plays.filter((p) => (p.gameName || "").toLowerCase().includes(q) || (p.players || "").toLowerCase().includes(q)).slice(0, 4) : [];
  const nothing = q && gameResults.length === 0 && listResults.length === 0 && playResults.length === 0;

  return (
    <div className="fixed inset-0 bg-black/80 z-[75] flex flex-col" onClick={onClose}>
      <div className="shrink-0 px-4" style={{ paddingTop: "max(0.75rem, env(safe-area-inset-top))" }} onClick={(e) => e.stopPropagation()}>
        <div className="relative">
          <Search size={16} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[#5C574F]" />
          <input autoFocus value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Spiele, Partien, Listen durchsuchen…"
            className="w-full h-12 bg-[#262422] border border-[#3A3631] rounded-[14px] pl-10 pr-10 text-[#F2EDE4] text-base font-body focus:outline-none focus:border-[#6C7FE0]" />
          <button onClick={onClose} className="absolute right-2 top-1/2 -translate-y-1/2 text-[#5C574F] p-1.5"><X size={18} /></button>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto p-4 space-y-5" onClick={(e) => e.stopPropagation()}>
        {!q && <p className="text-sm text-[#5C574F] text-center mt-8">Tippe, um in deiner ganzen Sammlung zu suchen.</p>}
        {nothing && <p className="text-sm text-[#5C574F] text-center mt-8">Nichts gefunden für "{query}".</p>}
        {gameResults.length > 0 && (
          <div>
            <p className="text-xs text-[#5C574F] uppercase tracking-wide mb-2">Spiele</p>
            <div className="space-y-2">
              {gameResults.map((g) => (
                <button key={g.id} onClick={() => onOpenGame(g)} className="w-full flex items-center gap-3 px-3 py-2 rounded-[14px] bg-[#262422] border border-[#3A3631]">
                  <Cover game={g} size="sm" />
                  <span className="flex-1 min-w-0 text-left text-sm text-[#F2EDE4] truncate">{g.name}</span>
                </button>
              ))}
            </div>
          </div>
        )}
        {listResults.length > 0 && (
          <div>
            <p className="text-xs text-[#5C574F] uppercase tracking-wide mb-2">Listen</p>
            <div className="space-y-2">
              {listResults.map((l) => (
                <button key={l.id} onClick={() => onOpenList(l)} className="w-full flex items-center gap-3 px-3.5 h-11 rounded-[14px] bg-[#262422] border border-[#3A3631]">
                  <span className="flex-1 min-w-0 text-left text-sm text-[#F2EDE4] truncate">{l.name}</span>
                  <span className="text-xs text-[#5C574F] shrink-0">{l.gameIds.length}</span>
                </button>
              ))}
            </div>
          </div>
        )}
        {playResults.length > 0 && (
          <div>
            <p className="text-xs text-[#5C574F] uppercase tracking-wide mb-2">Partien</p>
            <div className="space-y-2">
              {playResults.map((p) => (
                <button key={p.id} onClick={onGoToPlaylog} className="w-full flex items-center justify-between px-3.5 h-11 rounded-[14px] bg-[#262422] border border-[#3A3631]">
                  <span className="text-left text-sm text-[#F2EDE4] truncate">{p.gameName}</span>
                  <span className="text-xs text-[#5C574F] shrink-0">{p.date}</span>

              ))}
            </div>
          </div>
        )}

  };

  return (

/* ---------------- SWIPEABLE ROW (swipe left to reveal delete) ---------------- */
function SwipeableRow({ onDelete, children, disabled }) {
  const [dragX, setDragX] = useState(0);
  const startX = React.useRef(0);
  const dragging = React.useRef(false);
  const REVEAL = 76;

  const onTouchStart = (e) => {
    if (disabled) return;
    startX.current = e.touches[0].clientX;
    dragging.current = true;
  };
  const onTouchMove = (e) => {
    if (!dragging.current || disabled) return;
    const delta = e.touches[0].clientX - startX.current;
    if (delta < 0) setDragX(Math.max(delta, -REVEAL - 20));
    else setDragX(0);
  };
  const onTouchEnd = () => {
    if (!dragging.current) return;
    dragging.current = false;
    setDragX(dragX < -REVEAL / 2 ? -REVEAL : 0);
  };

  return (
    <div className="relative overflow-hidden rounded-[14px]">
      <button
        onClick={() => { onDelete(); setDragX(0); }}
        className="absolute inset-y-0 right-0 w-[76px] bg-[#C1443C] text-white flex flex-col items-center justify-center gap-0.5 text-[10px]"
        aria-label="Löschen"
      >
        <Trash2 size={16} /> Löschen
      </button>
      <div
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{ transform: `translateX(${dragX}px)`, transition: dragging.current ? "none" : "transform 200ms" }}
        className="relative bg-[#1C1B1A]"
      >
        {children}
      </div>
    </div>
  );
}

function PlayLog({ plays, games, onAdd, onEdit, onDelete, demoMode }) {
  const sorted = [...plays].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  const modeIcon = { "physical-owned": Home, "physical-other": Sofa, bga: Globe };
  const modeLabel = { "physical-owned": "Eigene Sammlung", "physical-other": "Geliehen / Event", bga: "BoardGameArena" };

  const currentYear = new Date().getFullYear();
  const yearPlays = plays.filter(p => p.date && new Date(p.date).getFullYear() === currentYear);
  const yearGameCount = new Set(yearPlays.map(p => p.gameId)).size;
  const estimatedMinutes = yearPlays.reduce((sum, p) => {
    const g = games.find(x => x.id === p.gameId);
    if (!g || !g.minTime) return sum;
    const avg = (parseInt(g.minTime) + parseInt(g.maxTime || g.minTime)) / 2;
    return sum + avg;
  }, 0);
  const estimatedHours = Math.round((estimatedMinutes / 60) * 10) / 10;

  const winCounts = useMemo(() => {
    const tally = {};
    plays.forEach(p => { if (p.winner && p.winner.trim()) { const name = p.winner.trim(); tally[name] = (tally[name] || 0) + 1; } });
    return Object.entries(tally).sort((a, b) => b[1] - a[1]).slice(0, 5);
  }, [plays]);
  const medals = ["🥇", "🥈", "🥉"];

  return (
    <div className="p-5 pb-6">
      <div className="flex items-center justify-between mb-4">
        <h1 className="font-display text-3xl text-[#F2EDE4]">Partien</h1>
      </div>
      {!demoMode && (
        <button onClick={onAdd} aria-label="Partie eintragen"
          className="fixed z-30 left-1/2 -translate-x-1/2 bg-[#6C7FE0] text-[#F2EDE4] w-14 h-14 flex items-center justify-center rounded-full shadow-lg active:scale-95"
          style={{ bottom: "calc(50px + env(safe-area-inset-bottom) + 10px)" }}>
          <Plus size={22} />
        </button>
      )}

      {yearPlays.length > 0 && (
        <div className="bg-gradient-to-r from-[#6C7FE0]/15 to-transparent border border-[#6C7FE0]/30 rounded-2xl p-4 mb-4">
          <p className="text-xs font-semibold text-[#6C7FE0] uppercase tracking-wide mb-2">{currentYear} bisher</p>
          <div className="flex items-center gap-5">
            <div><p className="font-display text-2xl text-[#F2EDE4]">{yearPlays.length}</p><p className="text-[#A39C8F] text-[11px] font-body">Partien</p></div>
            <div><p className="font-display text-2xl text-[#F2EDE4]">{yearGameCount}</p><p className="text-[#A39C8F] text-[11px] font-body">Spiele</p></div>
            <div><p className="font-display text-2xl text-[#F2EDE4]">{estimatedHours > 0 ? `~${estimatedHours}` : "—"}</p><p className="text-[#A39C8F] text-[11px] font-body">Stunden</p></div>
          </div>
        </div>
      )}

      {winCounts.length > 0 && (
        <div className="mb-5">
          <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-2">Bestenliste</h2>
          <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-4 space-y-2.5">
            {winCounts.map(([name, count], i) => (
              <div key={name} className="flex items-center gap-3">
                <span className="text-lg w-6 shrink-0">{medals[i] || `${i + 1}.`}</span>
                <span className="flex-1 min-w-0 text-[#F2EDE4] font-body truncate">{name}</span>
                <span className="text-[#D4A24C] text-sm font-mono shrink-0">{count}× gewonnen</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {sorted.length === 0 ? <p className="text-[#5C574F] text-sm font-body mt-8 text-center">Noch keine Partien eingetragen — auch geliehene oder online gespielte Spiele zählen.</p> : (
        <div className="space-y-2 pb-20">
          {sorted.map(p => {
            const IconC = modeIcon[p.mode] || Home;
            return (
              <SwipeableRow key={p.id} onDelete={() => onDelete(p.id)} disabled={demoMode}>
                <button onClick={() => onEdit(p)} className="w-full text-left bg-[#262422] border border-[#3A3631] rounded-[14px] px-4 py-3 flex items-center gap-3">
                  <div className="w-9 h-9 rounded-lg bg-[#2E2B28] flex items-center justify-center text-[#A39C8F] shrink-0"><IconC size={16} /></div>
                  <div className="flex-1 min-w-0">
                    <p className="text-[#F2EDE4] font-body truncate">{p.gameName}</p>
                    <p className="text-[#5C574F] text-xs font-body">{p.date} · {modeLabel[p.mode]}{p.winner ? ` · Sieger: ${p.winner}` : ""}</p>
                  </div>
                  <ChevronRight size={16} className="text-[#5C574F] shrink-0" />
                </button>
              </SwipeableRow>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ---------------- RECOMMENDATIONS ---------------- */
function Recommendations({ games, plays, onAddWishlist }) {
  const [discovering, setDiscovering] = useState(false);
  const [external, setExternal] = useState([]);
  const [externalError, setExternalError] = useState("");
  const playedIds = new Set(plays.map(p => p.gameId));
  const profile = useMemo(() => {
    const rated = games.filter(g => g.rating && parseFloat(g.rating) >= 8);
    const tagCount = {};
    rated.forEach(g => { [...(g.mechanisms || []), ...(g.categories || [])].forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; }); });
    return Object.entries(tagCount).sort((a, b) => b[1] - a[1]);
  }, [games]);
  const unplayed = games.filter(g => !playedIds.has(g.id));
  const scored = unplayed.map(g => {
    const tags = [...(g.mechanisms || []), ...(g.categories || [])];
    const score = profile.reduce((s, [tag, weight]) => (tags.includes(tag) ? s + weight : s), 0);
    return { game: g, score };
  }).filter(x => x.score > 0).sort((a, b) => b.score - a.score).slice(0, 8);
  const topTag = profile[0] ? profile[0][0] : null;

  const discoverNew = async () => {
    if (!topTag) return;
    setDiscovering(true); setExternalError("");
    try {
      const r = await bggSearch(topTag);
      const ownedNames = new Set(games.map(g => g.name.toLowerCase()));
      setExternal(r.filter(x => !ownedNames.has(x.name.toLowerCase())).slice(0, 6));
    } catch (e) { setExternalError("BGG ist gerade nicht am Tisch — neue Vorschläge klappen offline leider nicht."); }
    finally { setDiscovering(false); }
  };

  return (
    <div className="p-5 pb-6">
      <h1 className="font-display text-3xl text-[#F2EDE4] mb-1">Empfehlungen</h1>
      <p className="text-[#A39C8F] text-sm font-body mb-5">Basierend auf Spielen, die du mit 8+ bewertet hast — egal ob eigene Sammlung, geliehen oder BGA.</p>
      {profile.length === 0 ? (
        <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-5 text-center">
          <Sparkles size={28} className="text-[#D4A24C] mx-auto mb-2" />

          </p>
          <input
            value={url}

          <button
            onClick={() => onSave(url)}

          >
            <Check size={18} /> Speichern
          </button>
          {initialUrl && (
            <>
              <button onClick={onSyncNow} className="w-full bg-[#262422] border border-[#3A3631] text-[#F2EDE4] rounded-[14px] py-3 font-medium active:scale-[0.99]">
                Jetzt synchronisieren
              </button>
              <button onClick={onRemove} className="w-full text-[#A39C8F] text-sm font-body py-2">

            </>
          )}

      </div>
    </div>
  );
}
