/* ---------------- IMAGE RESIZE (for uploaded photos, keeps storage/sync small) ---------------- */
function resizeImageFile(file, maxDim = 640, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Lesen fehlgeschlagen"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Bild ungültig"));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------------- COMPLEXITY CLASSIFICATION ---------------- */
// Based on community consensus around BGG's "weight" (1-5): under ~2.0 reads as a family
// game, ~2.0-3.5 as an enthusiast ("Kenner") game, above that as an expert game. Party games
// are classified by genre (BGG category) rather than weight, since they're often light but
// play very differently from a family strategy game.
function complexityLabel(game) {
  const categories = game.categories || [];
  if (categories.some((c) => /party/i.test(c))) return "Partyspiel";
  const w = parseFloat(game.complexity);
  if (!w || isNaN(w)) return null;
  if (w < 2.0) return "Familienspiel";
  if (w < 3.5) return "Kennerspiel";
  return "Expertenspiel";
}
const COMPLEXITY_TONE = { Familienspiel: "teal", Kennerspiel: "amber", Expertenspiel: "red", Partyspiel: "default" };

/* ---------------- TAG ICON MAPPING (categories & mechanisms get a matching icon) ---------------- */
function tagIcon(name) {
  const n = name.toLowerCase();
  if (/card/.test(n)) return CardIcon;
  if (/dice/.test(n)) return Dices;
  if (/party/.test(n)) return Sparkles;
  if (/fantasy|mytholog|horror|sci-?fi|space/.test(n)) return Star;
  if (/economic|city|industry|trains?|transport|civilization/.test(n)) return Building;
  if (/fighting|war|military|miniature/.test(n)) return Sword;
  if (/puzzle|deduction|abstract/.test(n)) return Puzzle;
  if (/negotiat|trading|auction|bidding|voting/.test(n)) return Users;
  if (/real-time|time/.test(n)) return Clock;
  if (/travel|nautical|explorat|racing/.test(n)) return Globe;
  return Dices;
}

/* ---------------- IMAGE PICKER SHEET (Foto aufnehmen / Hochladen / URL) ---------------- */
function ImagePickerSheet({ onAdd, onClose }) {
  const [urlMode, setUrlMode] = useState(false);
  const [url, setUrl] = useState("");
  const [urlChecking, setUrlChecking] = useState(false);
  const [urlError, setUrlError] = useState("");
  const cameraRef = React.useRef(null);
  const uploadRef = React.useRef(null);

  const handleFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const dataUrl = await resizeImageFile(file);
    onAdd(dataUrl);
  };

  const submitUrl = () => {
    const trimmed = url.trim();
    if (!trimmed) return;
    setUrlChecking(true);
    setUrlError("");
    const img = new Image();
    const timer = setTimeout(() => { setUrlChecking(false); setUrlError("Diese Karte zieht nicht — Bild-Adresse nochmal prüfen."); }, 8000);
    img.onload = () => { clearTimeout(timer); setUrlChecking(false); onAdd(trimmed); };
    img.onerror = () => { clearTimeout(timer); setUrlChecking(false); setUrlError("Diese Karte zieht nicht — Bild-Adresse nochmal prüfen."); };
    img.src = trimmed;
  };

  return (
    <div className="fixed inset-0 bg-black/70 z-[70] flex items-end sm:items-center justify-center p-0 sm:p-6" onClick={onClose}>
      <div className="bg-[#1C1B1A] border border-[#3A3631] rounded-t-2xl sm:rounded-2xl w-full sm:max-w-sm rise-in font-body p-5 space-y-2" onClick={(e) => e.stopPropagation()}>
        <h3 className="font-display text-lg text-[#F2EDE4] mb-1">Foto hinzufügen</h3>
        {!urlMode ? (
          <>
            <button onClick={() => cameraRef.current && cameraRef.current.click()} className="w-full flex items-center gap-3 bg-[#262422] border border-[#3A3631] rounded-[14px] px-4 py-3 text-[#F2EDE4] text-sm">
              <Camera size={18} className="text-[#6C7FE0]" /> Foto aufnehmen
            </button>
            <button onClick={() => uploadRef.current && uploadRef.current.click()} className="w-full flex items-center gap-3 bg-[#262422] border border-[#3A3631] rounded-[14px] px-4 py-3 text-[#F2EDE4] text-sm">
              <Upload size={18} className="text-[#6C7FE0]" /> Hochladen
            </button>
            <button onClick={() => setUrlMode(true)} className="w-full flex items-center gap-3 bg-[#262422] border border-[#3A3631] rounded-[14px] px-4 py-3 text-[#F2EDE4] text-sm">
              <LinkIcon size={18} className="text-[#6C7FE0]" /> Per URL einfügen
            </button>
          </>
        ) : (
          <div className="space-y-2">
            <input onFocus={handleFocusScroll} autoFocus value={url} onChange={(e) => setUrl(e.target.value)} placeholder="https://…"
              className="w-full bg-[#262422] border border-[#3A3631] rounded-lg px-3 py-2 text-[#F2EDE4] text-sm focus:outline-none focus:border-[#6C7FE0]" />
            {urlError && <p className="text-xs text-[#C1443C]">{urlError}</p>}
            <button onClick={submitUrl} disabled={urlChecking || !url.trim()}
              className="w-full bg-[#6C7FE0] disabled:opacity-50 text-[#F2EDE4] rounded-lg py-2.5 text-sm font-medium flex items-center justify-center gap-2">
              {urlChecking ? <Loader2 size={14} /> : <Check size={14} />} {urlChecking ? "Prüfe Bild…" : "Hinzufügen"}
            </button>
          </div>
        )}
        <input
          ref={cameraRef}
          type="file"
          accept="image/*"
          style={{ position: "absolute", width: 1, height: 1, padding: 0, margin: -1, overflow: "hidden", clip: "rect(0,0,0,0)", border: 0 }}
          onChange={handleFile}
        />
        <input
          ref={uploadRef}
          type="file"
          accept="image/*"
          style={{ position: "absolute", width: 1, height: 1, padding: 0, margin: -1, overflow: "hidden", clip: "rect(0,0,0,0)", border: 0 }}
          onChange={handleFile}
        />
        <button onClick={onClose} className="w-full text-center py-2 text-[#A39C8F] text-sm">Abbrechen</button>
      </div>
    </div>
  );
}

/* ---------------- PHOTO GALLERY (used in game form, play form, and detail view) ---------------- */
function PhotoGallerySection({ images, onAdd, onRemove, hero = false, editable = true }) {
  const [sheetOpen, setSheetOpen] = useState(false);
  const [lightboxIndex, setLightboxIndex] = useState(null);
  const [carouselIndex, setCarouselIndex] = useState(0);
  const touchStartX = React.useRef(0);
  const safeIndex = Math.min(carouselIndex, Math.max(images.length - 1, 0));

  const onCarouselTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const onCarouselTouchEnd = (e) => {
    const delta = e.changedTouches[0].clientX - touchStartX.current;
    if (delta < -40 && safeIndex < images.length - 1) setCarouselIndex(safeIndex + 1);
    else if (delta > 40 && safeIndex > 0) setCarouselIndex(safeIndex - 1);
  };

  return (
    <div>
      {hero && (
        <div className="flex justify-center mb-3">
          <div className="relative">
            <div
              className="w-[200px] h-[200px] max-w-[55vw] max-h-[55vw] sm:max-w-[200px] sm:max-h-[200px] rounded-2xl overflow-hidden border border-[#3A3631] bg-[#2E2B28] flex items-center justify-center"
              onTouchStart={onCarouselTouchStart}
              onTouchEnd={onCarouselTouchEnd}
            >
              {images.length ? (
                <img src={images[safeIndex]} className="w-full h-full object-cover" onClick={() => setLightboxIndex(safeIndex)} />
              ) : (
                <Dices size={40} className="text-[#5C574F]" />
              )}
            </div>
            {images.length > 1 && (
              <div className="absolute bottom-2 left-0 right-0 flex justify-center gap-1.5">
                {images.map((_, i) => (
                  <div key={i} className={`w-1.5 h-1.5 rounded-full ${i === safeIndex ? "bg-[#F2EDE4]" : "bg-[#F2EDE4]/30"}`} />
                ))}
              </div>
            )}
            {editable && (
              <button type="button" onClick={() => setSheetOpen(true)} aria-label="Foto hinzufügen"
                className="absolute -bottom-1 -right-1 bg-[#6C7FE0] text-[#F2EDE4] rounded-full p-3 border-4 border-[#1C1B1A] active:scale-95">
                {images.length > 0 ? <Plus size={16} /> : <Camera size={16} />}
              </button>
            )}
          </div>
        </div>
      )}
      {!hero && (images.length > 0 || editable) && (
        <div className="flex gap-2 overflow-x-auto pb-1">
          {images.map((img, i) => (
            <button key={i} type="button" onClick={() => setLightboxIndex(i)} className="shrink-0 w-16 h-16 rounded-lg overflow-hidden border border-[#3A3631]">
              <img src={img} className="w-full h-full object-cover" />
            </button>
          ))}
          {editable && (
            <button type="button" onClick={() => setSheetOpen(true)} className="shrink-0 w-16 h-16 rounded-lg border-2 border-dashed border-[#3A3631] flex items-center justify-center text-[#5C574F]">
              <Plus size={18} />
            </button>
          )}
        </div>
      )}
      {sheetOpen && <ImagePickerSheet onAdd={(img) => { onAdd(img); setCarouselIndex(images.length); setSheetOpen(false); }} onClose={() => setSheetOpen(false)} />}
      {lightboxIndex !== null && images[lightboxIndex] && (
        <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-4" onClick={() => setLightboxIndex(null)}>
          <img src={images[lightboxIndex]} className="max-w-full max-h-[75vh] object-contain rounded-lg" onClick={(e) => e.stopPropagation()} />
          <button onClick={() => setLightboxIndex(null)} className="absolute top-4 right-4 text-white bg-black/40 rounded-full p-2"><X size={22} /></button>
          {editable && (
            <button
              onClick={(e) => { e.stopPropagation(); onRemove(lightboxIndex); setLightboxIndex(null); }}

            >
              <Trash2 size={16} /> Foto entfernen

          )}
        </div>
      )}
    </div>
  );
}

function normalizeSyncUrl(url) {
  if (!url) return "";
  let u = url.trim();
  if (!u) return "";
  if (!u.endsWith("/")) u += "/";
  return u;
}
async function cloudPush(syncUrl, games, plays, customCategories, customMechanisms) {
  const base = normalizeSyncUrl(syncUrl);
  if (!base) return;
  const payload = { games, plays, customCategories: customCategories || [], customMechanisms: customMechanisms || [], updatedAt: Date.now() };
  const res = await fetch(base + "data.json", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error("Der Spielzug wurde nicht gewertet — Speichern in der Cloud fehlgeschlagen");
  return payload.updatedAt;
}
async function cloudPull(syncUrl) {
  const base = normalizeSyncUrl(syncUrl);
  if (!base) return null;
  const res = await fetch(base + "data.json");
  if (!res.ok) throw new Error("Karten ziehen fehlgeschlagen — Cloud-Abruf hat nicht geklappt");
  const json = await res.json();
  return json;
}

/* ---------------- BGG API (best effort, needs internet) ---------------- */
async function bggSearch(query) {
  const url = `https://boardgamegeek.com/xmlapi2/search?query=${encodeURIComponent(query)}&type=boardgame`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("BGG würfelt gerade nicht mit — nicht erreichbar");
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, "text/xml");
  const items = Array.from(xml.getElementsByTagName("item")).slice(0, 8);
  return items.map((it) => ({
    bggId: it.getAttribute("id"),
    name: it.getElementsByTagName("name")[0]?.getAttribute("value") || "Unbekannt",
    year: it.getElementsByTagName("yearpublished")[0]?.getAttribute("value") || "",
  }));
}
async function bggThing(bggId) {
  const url = `https://boardgamegeek.com/xmlapi2/thing?id=${bggId}&stats=1`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("BGG würfelt gerade nicht mit — nicht erreichbar");
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, "text/xml");
  const item = xml.getElementsByTagName("item")[0];
  if (!item) throw new Error("Fehlwurf — kein Ergebnis gefunden");
  const nameEl = Array.from(item.getElementsByTagName("name")).find(n => n.getAttribute("type") === "primary") || item.getElementsByTagName("name")[0];
  const getTxt = (tag) => item.getElementsByTagName(tag)[0]?.textContent || "";
  const getAttr = (tag) => item.getElementsByTagName(tag)[0]?.getAttribute("value") || "";
  const mechanisms = Array.from(item.getElementsByTagName("link")).filter(l => l.getAttribute("type") === "boardgamemechanic").map(l => l.getAttribute("value"));
  const categories = Array.from(item.getElementsByTagName("link")).filter(l => l.getAttribute("type") === "boardgamecategory").map(l => l.getAttribute("value"));
  const publishers = Array.from(item.getElementsByTagName("link")).filter(l => l.getAttribute("type") === "boardgamepublisher").map(l => l.getAttribute("value"));
  const weight = item.getElementsByTagName("averageweight")[0]?.getAttribute("value");
  const bggImage = getTxt("image");
  return {
    bggId, name: nameEl?.getAttribute("value") || "Unbekannt", year: getAttr("yearpublished"),
    images: bggImage ? [bggImage] : [], minPlayers: getAttr("minplayers"), maxPlayers: getAttr("maxplayers"),
    minTime: getAttr("minplaytime"), maxTime: getAttr("maxplaytime"), age: getAttr("minage"),
    publishers, mechanisms, categories,
    complexity: weight ? Math.round(parseFloat(weight) * 10) / 10 : null,
  };
}

                <span className="text-[#F2EDE4] font-medium flex-1 min-w-0 truncate">{selectedGame.name}</span>
                <button onClick={() => setSelectedGame(null)} className="text-[#5C574F] text-xs shrink-0">Ändern</button>
              </div>
              <Segmented
                options={[{ v: "physical-owned", label: "Eigene Sammlung", icon: Home }, { v: "physical-other", label: "Geliehen / Event", icon: Sofa }, { v: "bga", label: "BoardGameArena", icon: Globe }]}
                value={mode}
                onChange={setMode}
              />
              <div>
                <label className="text-[11px] text-[#5C574F]">Datum</label>
                <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-auto min-w-[180px] h-12 bg-[#262422] border border-[#3A3631] rounded-[14px] px-3.5 text-[#F2EDE4] text-base mt-1.5" />
              </div>
              <input value={players} onChange={(e) => setPlayers(e.target.value)} placeholder="Mitspieler (optional)"
                className={`w-full h-12 border border-[#3A3631] rounded-[14px] px-3.5 text-[#F2EDE4] text-base focus:outline-none focus:border-[#6C7FE0] ${players ? "bg-[#262422]" : "bg-transparent"}`} />
              <input value={winner} onChange={(e) => setWinner(e.target.value)} placeholder="Gewinner (optional)"
                className={`w-full h-12 border border-[#3A3631] rounded-[14px] px-3.5 text-[#F2EDE4] text-base focus:outline-none focus:border-[#6C7FE0] ${winner ? "bg-[#262422]" : "bg-transparent"}`} />
              <textarea value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Notiz (optional)" rows={2}
                className={`w-full border border-[#3A3631] rounded-[14px] px-3.5 py-3 text-[#F2EDE4] text-base focus:outline-none focus:border-[#6C7FE0] ${notes ? "bg-[#262422]" : "bg-transparent"}`} />
              <div>
                <label className="text-[11px] text-[#5C574F]">Fotos</label>
                <div className="mt-1.5">
                  <PhotoGallerySection
                    images={images}
                    onAdd={(img) => setImages((prev) => [...prev, img])}
                    onRemove={(i) => setImages((prev) => prev.filter((_, idx) => idx !== i))}
                  />
                </div>
              </div>
            </>
          )}
        </div>
        {selectedGame && (
          <div className="shrink-0 border-t border-[#3A3631] p-4 space-y-2">
            <button onClick={save} className="w-full bg-[#6C7FE0] text-[#F2EDE4] rounded-[14px] py-3 font-medium active:scale-[0.99] flex items-center justify-center gap-2">
              <Check size={18} /> Partie speichern
            </button>
            {initial && (
              <button onClick={() => onDelete(initial.id)} className="w-full text-[#C1443C] text-sm font-body py-2 flex items-center justify-center gap-1.5">
                <Trash2 size={14} /> Partie löschen
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------- DASHBOARD ---------------- */
function Dashboard({ games, plays, onQuickFilter }) {
  const owned = games.filter(g => g.status === "owned");
  const playCounts = useMemo(() => {
    const map = {}; plays.forEach(p => { map[p.gameId] = (map[p.gameId] || 0) + 1; }); return map;
  }, [plays]);
  const lastPlays = [...plays].sort((a, b) => (b.date || "").localeCompare(a.date || "")).slice(0, 6);
  const dustCollectors = owned.filter(g => !playCounts[g.id]).sort((a, b) => (a.addedDate || "").localeCompare(b.addedDate || "")).slice(0, 6);
  const topRated = [...owned].filter(g => g.rating).sort((a, b) => parseInt(b.rating) - parseInt(a.rating)).slice(0, 6);
  const complexGames = owned.filter(g => g.complexity);
  const avgComplexity = complexGames.length ? (complexGames.reduce((s, g) => s + parseFloat(g.complexity), 0) / complexGames.length).toFixed(1) : "—";
  const thirtyDaysAgo = new Date(); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
  const recentPlayCounts = {};
  plays.forEach(p => { if (p.date && new Date(p.date) >= thirtyDaysAgo) recentPlayCounts[p.gameId] = (recentPlayCounts[p.gameId] || 0) + 1; });
  const topMonth = Object.entries(recentPlayCounts).sort((a, b) => b[1] - a[1])[0];
  const topMonthGame = topMonth ? games.find(g => g.id === topMonth[0]) : null;
  const digitalCount = plays.filter(p => p.mode === "bga").length;
  const physicalCount = plays.filter(p => p.mode !== "bga").length;
  const genreMix = useMemo(() => {
    const tally = {};
    owned.forEach(g => (g.categories || []).forEach(c => { tally[c] = (tally[c] || 0) + 1; }));
    return Object.entries(tally).sort((a, b) => b[1] - a[1]).slice(0, 7);
  }, [owned]);
  const gamePlaysMap = useMemo(() => {
    const map = {}; plays.forEach(p => { map[p.gameId] = p.gameName; }); return map;
  }, [plays]);
  const findGame = (id) => games.find(g => g.id === id);

  const mostPlayed = useMemo(() => {
    const entries = Object.entries(playCounts).sort((a, b) => b[1] - a[1])[0];
    return entries ? { game: findGame(entries[0]), count: entries[1] } : null;
  }, [playCounts, games]);
  const withComplexity = owned.filter(g => g.complexity);
  const heaviest = withComplexity.length ? [...withComplexity].sort((a, b) => parseFloat(b.complexity) - parseFloat(a.complexity))[0] : null;
  const lightest = withComplexity.length ? [...withComplexity].sort((a, b) => parseFloat(a.complexity) - parseFloat(b.complexity))[0] : null;
  const withMaxPlayers = owned.filter(g => g.maxPlayers);
  const biggestGroup = withMaxPlayers.length ? [...withMaxPlayers].sort((a, b) => parseInt(b.maxPlayers) - parseInt(a.maxPlayers))[0] : null;

  const wishlist = games.filter(g => g.status === "wishlist").slice(0, 6);

  return (
    <div className="p-5 space-y-6 pb-6">
      <div>
        <p className="text-[#5C574F] font-body text-sm">{new Date().toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "long" })}</p>
        <h1 className="font-display text-3xl text-[#F2EDE4] mt-0.5">Spielregal</h1>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-4">
          <p className="text-[#5C574F] text-xs font-body">Sammlung</p>
          <p className="font-display text-3xl text-[#F2EDE4] mt-1">{owned.length}</p>
          <p className="text-[#A39C8F] text-xs font-body mt-0.5">Spiele im Regal</p>
        </div>
        <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-4">
          <p className="text-[#5C574F] text-xs font-body">Ø Komplexität</p>
          <p className="font-display text-3xl text-[#F2EDE4] mt-1">{avgComplexity}</p>
          <p className="text-[#A39C8F] text-xs font-body mt-0.5">von 5</p>
        </div>
      </div>
      {topMonthGame && (
        <div className="bg-gradient-to-r from-[#D4A24C]/15 to-transparent border border-[#D4A24C]/30 rounded-2xl p-4 flex items-center gap-3">
          <Cover game={topMonthGame} size="md" />
          <div className="min-w-0">
            <p className="text-[#D4A24C] text-xs font-body font-medium flex items-center gap-1"><TrendingUp size={13} /> Spiel des Monats</p>
            <p className="text-[#F2EDE4] font-display text-lg truncate">{topMonthGame.name}</p>
            <p className="text-[#A39C8F] text-xs font-body">{topMonth[1]}× in den letzten 30 Tagen gespielt</p>
          </div>
        </div>
      )}

      {genreMix.length > 0 && (
        <div>
          <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-2">Deine Genre-Mischung</h2>
          <div className="flex flex-wrap gap-1.5">
            {genreMix.map(([cat, count], i) => {
              const CIcon = tagIcon(cat);
              const tones = ["#6C7FE0", "#D4A24C", "#4E8C82", "#C1443C"];
              const color = tones[i % tones.length];
              return (
                <span key={cat} className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-full text-xs font-body border" style={{ borderColor: color + "40", backgroundColor: color + "15", color }}>
                  <CIcon size={12} />{cat} <span className="opacity-60">· {count}</span>
                </span>
              );
            })}
          </div>
        </div>
      )}

      {(mostPlayed || heaviest || biggestGroup) && (
        <div>
          <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-2">Rekorde</h2>
          <div className="grid grid-cols-2 gap-2.5">
            {mostPlayed && mostPlayed.game && (
              <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-3">
                <p className="text-[10px] text-[#5C574F] font-body mb-1">🏆 Meistgespielt</p>
                <p className="text-[#F2EDE4] text-sm font-body font-medium truncate">{mostPlayed.game.name}</p>
                <p className="text-[#6C7FE0] text-xs font-mono">{mostPlayed.count}× gespielt</p>
              </div>
            )}
            {heaviest && (
              <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-3">
                <p className="text-[10px] text-[#5C574F] font-body mb-1">🧠 Schwerstes Spiel</p>
                <p className="text-[#F2EDE4] text-sm font-body font-medium truncate">{heaviest.name}</p>
                <p className="text-[#C1443C] text-xs font-mono">{parseFloat(heaviest.complexity).toFixed(1)}/5</p>
              </div>
            )}
            {lightest && lightest.id !== (heaviest && heaviest.id) && (
              <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-3">
                <p className="text-[10px] text-[#5C574F] font-body mb-1">🪶 Leichtestes Spiel</p>
                <p className="text-[#F2EDE4] text-sm font-body font-medium truncate">{lightest.name}</p>
                <p className="text-[#4E8C82] text-xs font-mono">{parseFloat(lightest.complexity).toFixed(1)}/5</p>
              </div>
            )}
            {biggestGroup && (
              <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-3">
                <p className="text-[10px] text-[#5C574F] font-body mb-1">👥 Größte Runde</p>
                <p className="text-[#F2EDE4] text-sm font-body font-medium truncate">{biggestGroup.name}</p>
                <p className="text-[#D4A24C] text-xs font-mono">bis zu {biggestGroup.maxPlayers} Spieler</p>
              </div>
            )}
          </div>
        </div>
      )}

      {wishlist.length > 0 && (
        <div>
          <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-2">Von der Wunschliste</h2>
          <div className="flex gap-3 overflow-x-auto pb-1">
            {wishlist.map(g => (
              <div key={g.id} className="shrink-0 w-28 bg-[#262422] border border-[#3A3631] rounded-2xl p-2.5">
                <Cover game={g} size="lg" />
                <p className="text-[#F2EDE4] font-body text-xs font-medium mt-1.5 truncate">{g.name}</p>
                {g.year && <p className="text-[#5C574F] text-[10px] font-body">{g.year}</p>}
              </div>
            ))}
          </div>
        </div>
      )}

      <div>
        <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-2">Zuletzt gespielt</h2>
        {lastPlays.length === 0 ? <p className="text-[#5C574F] text-sm font-body">Noch keine Partien eingetragen.</p> : (
          <div className="flex gap-3 overflow-x-auto pb-1">
            {lastPlays.map(p => {
              const g = findGame(p.gameId);
              return (
                <div key={p.id} className="shrink-0 w-28 bg-[#262422] border border-[#3A3631] rounded-2xl p-2.5">
                  {g ? <Cover game={g} size="lg" /> : <div className="w-full aspect-square rounded-lg bg-[#2E2B28] flex items-center justify-center text-[#5C574F]"><Dices size={24} /></div>}
                  <p className="text-[#F2EDE4] font-body text-xs font-medium mt-1.5 truncate">{p.gameName}</p>
                  <p className="text-[#5C574F] text-[10px] font-body">{p.date}</p>
                  <div className="mt-1"><Pill tone={p.mode === "bga" ? "teal" : "default"}>{p.mode === "bga" ? "BGA" : p.mode === "physical-other" ? "Geliehen" : "Sammlung"}</Pill></div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {topRated.length > 0 && (
        <div>
          <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-2">Deine Top-Bewertungen</h2>
          <div className="flex gap-3 overflow-x-auto pb-1">
            {topRated.map(g => (
              <div key={g.id} className="shrink-0 w-28 bg-[#262422] border border-[#3A3631] rounded-2xl p-2.5">
                <Cover game={g} size="lg" />
                <p className="text-[#F2EDE4] font-body text-xs font-medium mt-1.5 truncate">{g.name}</p>
                <p className="text-[#D4A24C] text-[11px] font-mono flex items-center gap-0.5 mt-0.5"><Star size={10} fill="#D4A24C" className="text-[#D4A24C]" /> {g.rating}/10</p>
              </div>
            ))}
          </div>
        </div>
      )}

      <div>
        <div className="flex items-center gap-2 mb-1"><Archive size={15} className="text-[#5C574F]" /><h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide">Staubfänger</h2></div>
        <p className="text-xs text-[#5C574F] mb-2">Spiele in deinem Regal, die schon am längsten auf ihre erste Partie warten.</p>
        {dustCollectors.length === 0 ? <p className="text-[#5C574F] text-sm font-body">Alles im Regal wurde schon gespielt. Sehr gut!</p> : (
          <div className="flex gap-3 overflow-x-auto pb-1">
            {dustCollectors.map(g => (
              <div key={g.id} className="shrink-0 w-28 bg-[#262422] border border-[#3A3631] rounded-2xl p-2.5">
                <Cover game={g} size="lg" />
                <p className="text-[#F2EDE4] font-body text-xs font-medium mt-1.5 truncate">{g.name}</p>
                <p className="text-[#5C574F] text-[10px] font-body">seit {g.addedDate || "?"}</p>
              </div>
            ))}
          </div>
        )}
      </div>
      {plays.length > 0 && (
        <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-4">
          <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-3">Digital vs. Physisch</h2>
          <div className="flex items-center gap-2">
            <div className="flex-1 h-2.5 rounded-full bg-[#3A3631] overflow-hidden flex">
              <div className="bg-[#6C7FE0] h-full" style={{ width: `${(physicalCount / plays.length) * 100}%` }} />
              <div className="bg-[#4E8C82] h-full" style={{ width: `${(digitalCount / plays.length) * 100}%` }} />
            </div>
          </div>
          <div className="flex justify-between mt-2 text-xs font-body"><span className="text-[#6C7FE0]">{physicalCount} physisch</span><span className="text-[#4E8C82]">{digitalCount} BGA</span></div>
        </div>
      )}
    </div>
  );
}

/* ---------------- COLLECTION FILTERS (Kategorie, Spieleranzahl, Mechanismus, Bewertung) ---------------- */
function CollectionFilterModal({ categoryOptions, mechanismOptions, filters, onChange, onClose, onReset }) {
  const toggle = (key, value) => {
    const list = filters[key];
    onChange({ ...filters, [key]: list.includes(value) ? list.filter((x) => x !== value) : [...list, value] });
  };

  return (
    <div className="fixed inset-0 bg-black/70 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-6">
      <div className="bg-[#1C1B1A] border border-[#3A3631] rounded-t-2xl sm:rounded-2xl w-full sm:max-w-lg max-h-[85dvh] flex flex-col rise-in font-body">
        <div className="shrink-0 border-b border-[#3A3631] px-5 py-4 flex items-center justify-between">
          <h2 className="font-display text-xl text-[#F2EDE4]">Filter</h2>
          <button onClick={onClose} className="text-[#A39C8F] p-1"><X size={22} /></button>
        </div>
        <div className="p-5 overflow-y-auto flex-1 space-y-6">
          <div>
            <label className="text-[11px] text-[#5C574F]">Spielbar mit … Personen</label>
            <input value={filters.players} onChange={(e) => onChange({ ...filters, players: e.target.value })} placeholder="z.B. 4" inputMode="numeric"
              className="w-full mt-1.5 h-12 bg-[#262422] border border-[#3A3631] rounded-[14px] px-3.5 text-[#F2EDE4] text-base focus:outline-none focus:border-[#6C7FE0]" />
          </div>
          <div>
            <label className="text-[11px] text-[#5C574F]">Mindestbewertung</label>
            <div className="mt-1.5">
              <StarRating value={filters.minRating} onChange={(v) => onChange({ ...filters, minRating: v })} />
            </div>
          </div>
          <div>
            <p className="text-[11px] text-[#5C574F] mb-1.5">Kategorien</p>
            <div className="flex flex-wrap gap-2">
              {categoryOptions.map((c) => {
                const isSel = filters.categories.includes(c);
                const CIcon = tagIcon(c);
                return (
                  <button key={c} onClick={() => toggle("categories", c)}
                    className={`px-3 py-1.5 rounded-full text-xs border flex items-center gap-1.5 ${isSel ? "bg-[#F2EDE4] border-[#F2EDE4] text-[#1C1B1A] font-medium" : "bg-[#262422] border-[#3A3631] text-[#A39C8F]"}`}>
                    <CIcon size={12} />{c}
                  </button>
                );
              })}
            </div>
          </div>
          <div>
            <p className="text-[11px] text-[#5C574F] mb-1.5">Mechanismen</p>
            <div className="flex flex-wrap gap-2">
              {mechanismOptions.map((m) => {
                const isSel = filters.mechanisms.includes(m);
                const MIcon = tagIcon(m);
                return (
                  <button key={m} onClick={() => toggle("mechanisms", m)}
                    className={`px-3 py-1.5 rounded-full text-xs border flex items-center gap-1.5 ${isSel ? "bg-[#F2EDE4] border-[#F2EDE4] text-[#1C1B1A] font-medium" : "bg-[#262422] border-[#3A3631] text-[#A39C8F]"}`}>
                    <MIcon size={12} />{m}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
        <div className="shrink-0 p-4 border-t border-[#3A3631] flex gap-2">
          <button onClick={onReset} className="flex-1 bg-[#262422] border border-[#3A3631] text-[#F2EDE4] rounded-[14px] py-3 font-medium">Zurücksetzen</button>
          <button onClick={onClose} className="flex-1 bg-[#6C7FE0] text-[#F2EDE4] rounded-[14px] py-3 font-medium">Anwenden</button>
        </div>
      </div>
    </div>
  );
}

function Collection({ games, plays, filterFn, clearFilter, onAdd, onView, onEdit, onDelete, categoryOptions, mechanismOptions, demoMode }) {
  const [query, setQuery] = useState("");
  const [statusFilter, setStatusFilter] = useState("owned");
  const [filterModalOpen, setFilterModalOpen] = useState(false);
  const [filters, setFilters] = useState({ categories: [], mechanisms: [], players: "", minRating: "" });
  const [contextGame, setContextGame] = useState(null);
  const longPressTimer = React.useRef(null);
  const longPressFired = React.useRef(false);
  const startLongPress = (g) => {
    if (demoMode) return;
    longPressFired.current = false;
    longPressTimer.current = setTimeout(() => { longPressFired.current = true; setContextGame(g); }, 500);
  };
  const cancelLongPress = () => { if (longPressTimer.current) clearTimeout(longPressTimer.current); };
  const activeFilterCount = filters.categories.length + filters.mechanisms.length + (filters.players ? 1 : 0) + (filters.minRating ? 1 : 0);
  const playCounts = useMemo(() => {
    const map = {}; plays.forEach(p => { map[p.gameId] = (map[p.gameId] || 0) + 1; }); return map;
  }, [plays]);
  let list = games.filter(g => (statusFilter === "all" ? true : g.status === statusFilter));
  if (query) list = list.filter(g => g.name.toLowerCase().includes(query.toLowerCase()));
  if (filterFn) list = list.filter(filterFn);
  if (filters.categories.length) list = list.filter(g => filters.categories.every(c => (g.categories || []).includes(c)));
  if (filters.mechanisms.length) list = list.filter(g => filters.mechanisms.every(m => (g.mechanisms || []).includes(m)));
  if (filters.players) list = list.filter(g => g.minPlayers && g.maxPlayers && parseInt(filters.players) >= parseInt(g.minPlayers) && parseInt(filters.players) <= parseInt(g.maxPlayers));
  if (filters.minRating) list = list.filter(g => g.rating && parseInt(g.rating) >= parseInt(filters.minRating));

  return (
    <div className="p-5 pb-6">
      <div className="flex items-center justify-between mb-4">
        <h1 className="font-display text-3xl text-[#F2EDE4]">Sammlung</h1>
        <button onClick={onAdd} disabled={demoMode} className="bg-[#6C7FE0] disabled:opacity-30 text-[#F2EDE4] w-12 h-12 flex items-center justify-center rounded-[14px] active:scale-95"><Plus size={20} /></button>
      </div>
      <div className="mb-3">
        <div className="relative">
          <Search size={16} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[#5C574F]" />
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Suchen…"
            className="w-full h-12 bg-[#262422] border border-[#3A3631] rounded-[14px] pl-10 pr-3.5 text-[#F2EDE4] text-base font-body placeholder-[#5C574F] focus:outline-none focus:border-[#D4A24C]" />
        </div>
      </div>
      <div className="flex items-center gap-2 mb-2">
        <div className="flex-1">
          <Segmented
            options={[{ v: "owned", label: "Besitz" }, { v: "wishlist", label: "Wunschliste" }, { v: "all", label: "Alle" }]}
            value={statusFilter}
            onChange={setStatusFilter}
          />
        </div>
        <button onClick={() => setFilterModalOpen(true)} className="relative shrink-0 w-12 h-12 flex items-center justify-center bg-[#262422] border border-[#3A3631] rounded-[14px] text-[#A39C8F]">
          <Puzzle size={18} />
          {activeFilterCount > 0 && <span className="absolute -top-1 -right-1 bg-[#6C7FE0] text-[#F2EDE4] text-[10px] w-4 h-4 rounded-full flex items-center justify-center">{activeFilterCount}</span>}
        </button>

/* ---------------- SWIPEABLE ROW (swipe left to reveal delete) ---------------- */
function SwipeableRow({ onDelete, children, disabled }) {
  const [dragX, setDragX] = useState(0);
  const startX = React.useRef(0);
  const dragging = React.useRef(false);
  const REVEAL = 76;

  const onTouchStart = (e) => {
    if (disabled) return;
    startX.current = e.touches[0].clientX;
    dragging.current = true;
  };
  const onTouchMove = (e) => {
    if (!dragging.current || disabled) return;
    const delta = e.touches[0].clientX - startX.current;
    if (delta < 0) setDragX(Math.max(delta, -REVEAL - 20));
    else setDragX(0);
  };
  const onTouchEnd = () => {
    if (!dragging.current) return;
    dragging.current = false;
    setDragX(dragX < -REVEAL / 2 ? -REVEAL : 0);
  };

  return (
    <div className="relative overflow-hidden rounded-[14px]">
      <button
        onClick={() => { onDelete(); setDragX(0); }}
        className="absolute inset-y-0 right-0 w-[76px] bg-[#C1443C] text-white flex flex-col items-center justify-center gap-0.5 text-[10px]"
        aria-label="Löschen"
      >
        <Trash2 size={16} /> Löschen
      </button>
      <div
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{ transform: `translateX(${dragX}px)`, transition: dragging.current ? "none" : "transform 200ms" }}
        className="relative bg-[#1C1B1A]"
      >
        {children}
      </div>
    </div>
  );
}

function PlayLog({ plays, games, onAdd, onEdit, onDelete, demoMode }) {
  const sorted = [...plays].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  const modeIcon = { "physical-owned": Home, "physical-other": Sofa, bga: Globe };
  const modeLabel = { "physical-owned": "Eigene Sammlung", "physical-other": "Geliehen / Event", bga: "BoardGameArena" };

  const currentYear = new Date().getFullYear();
  const yearPlays = plays.filter(p => p.date && new Date(p.date).getFullYear() === currentYear);
  const yearGameCount = new Set(yearPlays.map(p => p.gameId)).size;
  const estimatedMinutes = yearPlays.reduce((sum, p) => {
    const g = games.find(x => x.id === p.gameId);
    if (!g || !g.minTime) return sum;
    const avg = (parseInt(g.minTime) + parseInt(g.maxTime || g.minTime)) / 2;
    return sum + avg;
  }, 0);
  const estimatedHours = Math.round((estimatedMinutes / 60) * 10) / 10;

  const winCounts = useMemo(() => {
    const tally = {};
    plays.forEach(p => { if (p.winner && p.winner.trim()) { const name = p.winner.trim(); tally[name] = (tally[name] || 0) + 1; } });
    return Object.entries(tally).sort((a, b) => b[1] - a[1]).slice(0, 5);
  }, [plays]);
  const medals = ["🥇", "🥈", "🥉"];

  return (
    <div className="p-5 pb-6">
      <div className="flex items-center justify-between mb-4">
        <h1 className="font-display text-3xl text-[#F2EDE4]">Partien</h1>
        <button onClick={onAdd} disabled={demoMode} className="bg-[#6C7FE0] disabled:opacity-30 text-[#F2EDE4] w-12 h-12 flex items-center justify-center rounded-[14px] active:scale-95"><Plus size={20} /></button>
      </div>

      {yearPlays.length > 0 && (
        <div className="bg-gradient-to-r from-[#6C7FE0]/15 to-transparent border border-[#6C7FE0]/30 rounded-2xl p-4 mb-4">
          <p className="text-xs font-semibold text-[#6C7FE0] uppercase tracking-wide mb-2">{currentYear} bisher</p>
          <div className="flex items-center gap-5">
            <div><p className="font-display text-2xl text-[#F2EDE4]">{yearPlays.length}</p><p className="text-[#A39C8F] text-[11px] font-body">Partien</p></div>
            <div><p className="font-display text-2xl text-[#F2EDE4]">{yearGameCount}</p><p className="text-[#A39C8F] text-[11px] font-body">Spiele</p></div>
            <div><p className="font-display text-2xl text-[#F2EDE4]">{estimatedHours > 0 ? `~${estimatedHours}` : "—"}</p><p className="text-[#A39C8F] text-[11px] font-body">Stunden</p></div>
          </div>
        </div>
      )}

      {winCounts.length > 0 && (
        <div className="mb-5">
          <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-2">Bestenliste</h2>
          <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-4 space-y-2.5">
            {winCounts.map(([name, count], i) => (
              <div key={name} className="flex items-center gap-3">
                <span className="text-lg w-6 shrink-0">{medals[i] || `${i + 1}.`}</span>
                <span className="flex-1 min-w-0 text-[#F2EDE4] font-body truncate">{name}</span>
                <span className="text-[#D4A24C] text-sm font-mono shrink-0">{count}× gewonnen</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {sorted.length === 0 ? <p className="text-[#5C574F] text-sm font-body mt-8 text-center">Noch keine Partien eingetragen — auch geliehene oder online gespielte Spiele zählen.</p> : (
        <div className="space-y-2">
          {sorted.map(p => {
            const IconC = modeIcon[p.mode] || Home;
            return (
              <SwipeableRow key={p.id} onDelete={() => onDelete(p.id)} disabled={demoMode}>
                <button onClick={() => onEdit(p)} className="w-full text-left bg-[#262422] border border-[#3A3631] rounded-[14px] px-4 py-3 flex items-center gap-3">
                  <div className="w-9 h-9 rounded-lg bg-[#2E2B28] flex items-center justify-center text-[#A39C8F] shrink-0"><IconC size={16} /></div>
                  <div className="flex-1 min-w-0">
                    <p className="text-[#F2EDE4] font-body truncate">{p.gameName}</p>
                    <p className="text-[#5C574F] text-xs font-body">{p.date} · {modeLabel[p.mode]}{p.winner ? ` · Sieger: ${p.winner}` : ""}</p>
                  </div>
                  <ChevronRight size={16} className="text-[#5C574F] shrink-0" />
                </button>
              </SwipeableRow>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ---------------- RECOMMENDATIONS ---------------- */
function Recommendations({ games, plays, onAddWishlist }) {
  const [discovering, setDiscovering] = useState(false);
  const [external, setExternal] = useState([]);
  const [externalError, setExternalError] = useState("");
  const playedIds = new Set(plays.map(p => p.gameId));
  const profile = useMemo(() => {
    const rated = games.filter(g => g.rating && parseFloat(g.rating) >= 8);
    const tagCount = {};
    rated.forEach(g => { [...(g.mechanisms || []), ...(g.categories || [])].forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; }); });
    return Object.entries(tagCount).sort((a, b) => b[1] - a[1]);
  }, [games]);
  const unplayed = games.filter(g => !playedIds.has(g.id));
  const scored = unplayed.map(g => {
    const tags = [...(g.mechanisms || []), ...(g.categories || [])];
    const score = profile.reduce((s, [tag, weight]) => (tags.includes(tag) ? s + weight : s), 0);
    return { game: g, score };
  }).filter(x => x.score > 0).sort((a, b) => b.score - a.score).slice(0, 8);
  const topTag = profile[0] ? profile[0][0] : null;

  const discoverNew = async () => {
    if (!topTag) return;
    setDiscovering(true); setExternalError("");
    try {
      const r = await bggSearch(topTag);
      const ownedNames = new Set(games.map(g => g.name.toLowerCase()));
      setExternal(r.filter(x => !ownedNames.has(x.name.toLowerCase())).slice(0, 6));
    } catch (e) { setExternalError("BGG ist gerade nicht am Tisch — neue Vorschläge klappen offline leider nicht."); }
    finally { setDiscovering(false); }
  };

  return (
    <div className="p-5 pb-6">
      <h1 className="font-display text-3xl text-[#F2EDE4] mb-1">Empfehlungen</h1>
      <p className="text-[#A39C8F] text-sm font-body mb-5">Basierend auf Spielen, die du mit 8+ bewertet hast — egal ob eigene Sammlung, geliehen oder BGA.</p>
      {profile.length === 0 ? (
        <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-5 text-center">
          <Sparkles size={28} className="text-[#D4A24C] mx-auto mb-2" />
          <p className="text-[#A39C8F] text-sm font-body">Bewerte ein paar gespielte Spiele mit 8 oder höher, damit ich ein Geschmacksprofil erstellen kann.</p>
        </div>
      ) : (
        <>
          <div className="bg-gradient-to-r from-[#6C7FE0]/15 to-transparent border border-[#6C7FE0]/30 rounded-2xl p-4 mb-6">
            <p className="text-xs font-semibold text-[#6C7FE0] uppercase tracking-wide mb-2">Dein Geschmacksprofil</p>
            <div className="flex flex-wrap gap-1.5">
              {profile.slice(0, 8).map(([tag, weight]) => {
                const TIcon = tagIcon(tag);
                return (
                  <span key={tag} className="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs bg-[#1C1B1A]/40 text-[#F2EDE4] border border-[#6C7FE0]/20">
                    <TIcon size={11} />{tag}
                  </span>
                );
              })}
            </div>
          </div>

          <div className="mb-6">
            <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-2">Ungespielt, passt zu dir</h2>
            {scored.length === 0 ? (
              <p className="text-[#5C574F] text-sm font-body">Kein ungespieltes Spiel überschneidet sich aktuell mit deinem Profil.</p>
            ) : (
              <div className="grid grid-cols-2 gap-3">
                {scored.map(({ game }) => {
                  const tags = [...(game.mechanisms || []), ...(game.categories || [])];
                  const match = profile.find(([t]) => tags.includes(t));
                  const matchTag = match ? match[0] : null;
                  return (
                    <div key={game.id} className="bg-[#262422] border border-[#3A3631] rounded-2xl p-3">
                      <Cover game={game} size="lg" />
                      <p className="text-[#F2EDE4] font-body text-sm font-medium mt-2 leading-tight truncate">{game.name}</p>
                      {matchTag && <p className="text-[#6C7FE0] text-[11px] font-body mt-0.5 truncate">✨ {matchTag}</p>}
                      <div className="mt-1.5 flex items-center gap-1.5 flex-wrap">
                        <Pill tone={game.status === "owned" ? "teal" : "amber"}>{game.status === "owned" ? "besitzt du" : "nicht in Sammlung"}</Pill>
                      </div>
                      {game.status !== "owned" && game.status !== "wishlist" && (
                        <button onClick={() => onAddWishlist(game)} className="w-full mt-2 h-9 flex items-center justify-center gap-1.5 bg-[#6C7FE0]/15 text-[#6C7FE0] rounded-[10px] text-xs font-medium">
                          <Plus size={13} /> Zur Wunschliste
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          <div>
            <div className="flex items-center justify-between mb-2">
              <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide">Neu entdecken</h2>
              <button onClick={discoverNew} disabled={discovering} className="flex items-center gap-1.5 text-xs font-body text-[#D4A24C] disabled:opacity-50">
                {discovering ? <Loader2 size={13} /> : <Sparkles size={13} />}{topTag ? `Nach "${topTag}" suchen` : "Suchen"}
              </button>
            </div>
            {externalError && <p className="text-sm text-[#D4A24C] font-body">{externalError}</p>}
            {external.length > 0 && (
              <div className="grid grid-cols-2 gap-3">
                {external.map(r => (
                  <div key={r.bggId} className="bg-[#262422] border border-[#3A3631] rounded-2xl p-3">
                    <div className="w-full aspect-square rounded-lg border border-[#3A3631] bg-[#2E2B28] flex items-center justify-center text-[#5C574F]">
                      <Dices size={28} />
                    </div>
                    <p className="text-[#F2EDE4] font-body text-sm font-medium mt-2 leading-tight truncate">{r.name}</p>
                    <p className="text-[#5C574F] text-xs font-body">{r.year}</p>
                    <button onClick={() => onAddWishlist({ name: r.name, year: r.year, bggId: r.bggId })} className="w-full mt-2 h-9 flex items-center justify-center gap-1.5 bg-[#6C7FE0]/15 text-[#6C7FE0] rounded-[10px] text-xs font-medium">
                      <Plus size={13} /> Zur Wunschliste
                    </button>
                  </div>
                ))}
              </div>
            )}
            {external.length === 0 && !externalError && <p className="text-[#5C574F] text-sm font-body">Tippe auf „Suchen", um passende neue Spiele bei BGG zu finden (benötigt Internetzugriff).</p>}
          </div>
        </>
      )}
    </div>
  );
}

            onChange={(e) => setUrl(e.target.value)}
            placeholder="https://dein-projekt-default-rtdb.firebasedatabase.app/"
            className="w-full bg-[#262422] border border-[#3A3631] rounded-lg px-3 py-2 text-[#F2EDE4] text-sm focus:outline-none focus:border-[#D4A24C]"
          />
          <div className="flex items-center gap-2 text-xs">
            {status === "syncing" && <><Loader2 size={13} /> <span className="text-[#A39C8F]">Synchronisiere…</span></>}
            {status === "synced" && <span className="text-[#4E8C82]">Zuletzt synchronisiert: {lastSynced ? new Date(lastSynced).toLocaleTimeString("de-DE") : "gerade eben"}</span>}
            {status === "error" && <span className="text-[#C1443C]">Patzer beim Synchronisieren — Internet oder Adresse prüfen</span>}
            {status === "idle" && !initialUrl && <span className="text-[#5C574F]">Noch nicht eingerichtet</span>}
          </div>
          <button
            onClick={() => onSave(url)}
            disabled={!url.trim()}
            className="w-full bg-[#6C7FE0] disabled:opacity-40 text-[#F2EDE4] rounded-[14px] py-3 font-medium active:scale-[0.99] flex items-center justify-center gap-2"
          >
            <Check size={18} /> Speichern
          </button>
          {initialUrl && (
            <>
              <button onClick={onSyncNow} className="w-full bg-[#262422] border border-[#3A3631] text-[#F2EDE4] rounded-[14px] py-3 font-medium active:scale-[0.99]">
                Jetzt synchronisieren
              </button>
              <button onClick={onRemove} className="w-full text-[#A39C8F] text-sm font-body py-2">
                Verbindung trennen (Daten bleiben in Firebase erhalten)
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------------- MAIN APP ---------------- */
function App() {
  const [games, setGames] = useState([]);
  const [plays, setPlays] = useState([]);
  const [customCategories, setCustomCategories] = useState([]);
  const [customMechanisms, setCustomMechanisms] = useState([]);
  const [settingsModalOpen, setSettingsModalOpen] = useState(false);
  const [demoMode, setDemoMode] = useState(false);
  const displayGames = demoMode ? DEMO_GAMES : games;
  const displayPlays = demoMode ? DEMO_PLAYS : plays;
  const [tab, setTab] = useState("dashboard");
  const [gameModal, setGameModal] = useState(null);
  const [detailGame, setDetailGame] = useState(null);
  const [playModal, setPlayModal] = useState(null);
  const [quickFilter, setQuickFilter] = useState(null);
  const [syncUrl, setSyncUrl] = useState(() => localStorage.getItem(SYNC_URL_KEY) || "");
  const [syncModalOpen, setSyncModalOpen] = useState(!localStorage.getItem(SYNC_URL_KEY));
  const [syncStatus, setSyncStatus] = useState("idle");
  const [lastSynced, setLastSynced] = useState(null);
  const categoryOptions = useMemo(() => {
    const merged = [...DEFAULT_CATEGORIES];
    customCategories.forEach((c) => { if (!merged.includes(c)) merged.push(c); });
    return merged;
  }, [customCategories]);
  const mechanismOptions = useMemo(() => {
    const merged = [...DEFAULT_MECHANISMS];
    customMechanisms.forEach((m) => { if (!merged.includes(m)) merged.push(m); });
    return merged;
  }, [customMechanisms]);
  const publisherOptions = useMemo(() => {
    const set = new Set();
    games.forEach((g) => (g.publishers || []).forEach((p) => set.add(p)));
    return Array.from(set).sort();
  }, [games]);
  const addCustomCategory = (name) => setCustomCategories((prev) => (prev.includes(name) || DEFAULT_CATEGORIES.includes(name) ? prev : [...prev, name]));
  const removeCustomCategory = (name) => setCustomCategories((prev) => prev.filter((c) => c !== name));
  const addCustomMechanism = (name) => setCustomMechanisms((prev) => (prev.includes(name) || DEFAULT_MECHANISMS.includes(name) ? prev : [...prev, name]));
  const removeCustomMechanism = (name) => setCustomMechanisms((prev) => prev.filter((m) => m !== name));
  const skipNextPush = React.useRef(true);
  const pushTimer = React.useRef(null);
  const scrollElRef = React.useRef(null);
  const touchStartY = React.useRef(0);
  const tracking = React.useRef(false);
  const [pullY, setPullY] = useState(0);
  const [refreshing, setRefreshing] = useState(false);
  const PULL_THRESHOLD = 70;

  const pullLatest = async () => {
    if (!syncUrl) {
      await new Promise((r) => setTimeout(r, 400));
      return;
    }
    setSyncStatus("syncing");
    try {
      const remote = await cloudPull(syncUrl);
      skipNextPush.current = true;
      setGames((remote && remote.games) || []);
      setPlays((remote && remote.plays) || []);
      setCustomCategories((remote && remote.customCategories) || []);
      setCustomMechanisms((remote && remote.customMechanisms) || []);
      setSyncStatus("synced");
      setLastSynced(Date.now());
    } catch {
      setSyncStatus("error");
    }
  };

  const onTouchStart = (e) => {
    if (scrollElRef.current && scrollElRef.current.scrollTop <= 0) {
      touchStartY.current = e.touches[0].clientY;
      tracking.current = true;
    }
  };
  const onTouchMove = (e) => {
    if (!tracking.current || refreshing) return;
    const delta = e.touches[0].clientY - touchStartY.current;
    if (delta > 0 && scrollElRef.current && scrollElRef.current.scrollTop <= 0) {
      setPullY(Math.min(delta * 0.5, 110));
    } else {
      tracking.current = false;
      setPullY(0);
    }
  };
  const onTouchEnd = async () => {
    if (!tracking.current) return;
    tracking.current = false;
    if (pullY >= PULL_THRESHOLD) {
      setRefreshing(true);
      setPullY(56);
      await pullLatest();
      setRefreshing(false);
      setPullY(0);
    } else {
      setPullY(0);
    }
  };

  // On mount: load data directly from Firebase — this is the sole source of truth, nothing persists locally.
  useEffect(() => {
    if (!syncUrl) return;
    setSyncStatus("syncing");
    cloudPull(syncUrl).then((remote) => {
      setGames((remote && remote.games) || []);
      setPlays((remote && remote.plays) || []);
      setCustomCategories((remote && remote.customCategories) || []);
      setCustomMechanisms((remote && remote.customMechanisms) || []);
      setSyncStatus("synced");
      setLastSynced(Date.now());
      skipNextPush.current = true;
    }).catch(() => setSyncStatus("error"));
  }, []);

  // Write to Firebase (debounced) whenever games/plays/taxonomy change. No local copy is kept anywhere else.
  useEffect(() => {
    if (!syncUrl) return;
    if (skipNextPush.current) { skipNextPush.current = false; return; }
    if (pushTimer.current) clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(() => {
      setSyncStatus("syncing");
      cloudPush(syncUrl, games, plays, customCategories, customMechanisms).then(() => {
        setSyncStatus("synced");
        setLastSynced(Date.now());
      }).catch(() => setSyncStatus("error"));
    }, 1200);
    return () => clearTimeout(pushTimer.current);
  }, [games, plays, customCategories, customMechanisms, syncUrl]);

  const saveSyncUrl = (url) => {
    const trimmed = url.trim();
    localStorage.setItem(SYNC_URL_KEY, trimmed);
    setSyncUrl(trimmed);
    skipNextPush.current = true;
    setSyncStatus("syncing");
    cloudPull(trimmed).then((remote) => {
      if (remote && (remote.games || remote.plays)) {
        setGames(remote.games || []);
        setPlays(remote.plays || []);
        setCustomCategories(remote.customCategories || []);
        setCustomMechanisms(remote.customMechanisms || []);
      } else {
        cloudPush(trimmed, games, plays, customCategories, customMechanisms);
      }
      setSyncStatus("synced");
      setLastSynced(Date.now());
    }).catch(() => setSyncStatus("error"));
    setSyncModalOpen(false);
  };

  const syncNow = () => {
    if (!syncUrl) return;
    setSyncStatus("syncing");
    cloudPush(syncUrl, games, plays, customCategories, customMechanisms).then(() => {
      setSyncStatus("synced");
      setLastSynced(Date.now());
    }).catch(() => setSyncStatus("error"));
  };

  const removeSync = () => {
    localStorage.removeItem(SYNC_URL_KEY);
    setSyncUrl("");
    setSyncStatus("idle");
    setSyncModalOpen(false);
  };

  const saveGame = (game) => {
    setGames(prev => { const exists = prev.find(g => g.id === game.id); return exists ? prev.map(g => g.id === game.id ? game : g) : [...prev, game]; });
    setGameModal(null);
  };
  const deleteGame = (id) => { setGames(prev => prev.filter(g => g.id !== id)); setGameModal(null); };
  const addToWishlistFromRecommendation = (rec) => {
    setGames(prev => {
      if (rec.id && prev.some(g => g.id === rec.id)) {
        return prev.map(g => g.id === rec.id ? { ...g, status: "wishlist" } : g);
      }
      return [...prev, {
        id: uid(), bggId: rec.bggId || "", name: rec.name, year: rec.year || "",
        publishers: [], images: [], minPlayers: "", maxPlayers: "", bestPlayers: "",
        minTime: "", maxTime: "", age: "", complexity: "", mechanisms: [], categories: [],
        status: "wishlist", location: "", notes: "", rating: "", addedDate: new Date().toISOString().slice(0, 10),
      }];
    });
  };
  const savePlay = (play) => {
    setPlays(prev => { const exists = prev.find(p => p.id === play.id); return exists ? prev.map(p => p.id === play.id ? play : p) : [...prev, play]; });
    setPlayModal(null);
  };
  const deletePlay = (id) => { setPlays(prev => prev.filter(p => p.id !== id)); setPlayModal(null); };

  const tabs = [
    { id: "dashboard", label: "Übersicht", icon: Home },
    { id: "collection", label: "Sammlung", icon: Library },
    { id: "playlog", label: "Partien", icon: ListChecks },
    { id: "recommendations", label: "Ideen", icon: Sparkles },
  ];

  return (
    <div className="h-[100dvh] bg-[#1C1B1A] font-body flex flex-col max-w-3xl mx-auto relative overflow-hidden">
      <div
        className="shrink-0 flex justify-end gap-2 px-4 pb-1"
        style={{ paddingTop: "max(0.75rem, env(safe-area-inset-top))" }}
      >
        <button
          onClick={() => setSettingsModalOpen(true)}
          className="bg-[#262422] border border-[#3A3631] rounded-full p-2.5 active:scale-95"
          aria-label="Einstellungen"
        >
          <Settings size={16} className="text-[#5C574F]" />
        </button>
        <button
          onClick={() => setSyncModalOpen(true)}
          className="bg-[#262422] border border-[#3A3631] rounded-full p-2.5 active:scale-95"
          aria-label="Synchronisation"
        >
          {syncStatus === "syncing" ? (
            <Loader2 size={16} className="text-[#D4A24C]" />
          ) : syncUrl ? (
            <Globe size={16} className={syncStatus === "error" ? "text-[#C1443C]" : "text-[#5C574F]"} />
          ) : (
            <Globe size={16} className="text-[#5C574F]" />
          )}
        </button>
      </div>
      {demoMode && (
        <div className="shrink-0 mx-4 mb-2 px-3.5 py-2 bg-[#D4A24C]/15 border border-[#D4A24C]/30 rounded-[14px] flex items-center justify-between gap-2">
          <span className="text-xs text-[#D4A24C] font-medium">Demo-Vorschau — wird nicht gespeichert</span>
          <button onClick={() => setDemoMode(false)} className="text-xs text-[#D4A24C] underline shrink-0">Beenden</button>
        </div>
      )}
      <div
        ref={scrollElRef}
        className="flex-1 overflow-y-auto min-h-0"
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      >
        <div
          className="flex items-center justify-center overflow-hidden transition-[height] duration-200"
          style={{ height: pullY }}
        >
          <Loader2
            size={20}
            className={refreshing ? "text-[#D4A24C]" : "text-[#5C574F]"}
            style={{ opacity: Math.min(pullY / PULL_THRESHOLD, 1) }}
          />
        </div>
        {tab === "dashboard" && <Dashboard games={displayGames} plays={displayPlays} onQuickFilter={(fn) => { setQuickFilter(() => fn); setTab("collection"); }} />}
        {tab === "collection" && <Collection games={displayGames} plays={displayPlays} filterFn={quickFilter} clearFilter={() => setQuickFilter(null)} onAdd={() => !demoMode && setGameModal({ editing: null })} onView={(g) => setDetailGame(g)} onEdit={(g) => setGameModal({ editing: g })} onDelete={(g) => deleteGame(g.id)} categoryOptions={categoryOptions} mechanismOptions={mechanismOptions} demoMode={demoMode} />}
        {tab === "playlog" && <PlayLog plays={displayPlays} games={displayGames} onAdd={() => !demoMode && setPlayModal({ editing: null })} onEdit={(p) => !demoMode && setPlayModal({ editing: p })} onDelete={deletePlay} demoMode={demoMode} />}
        {tab === "recommendations" && <Recommendations games={displayGames} plays={displayPlays} onAddWishlist={addToWishlistFromRecommendation} />}
      </div>
      <div className="shrink-0 bg-[#1C1B1A] border-t border-[#3A3631] px-2 pt-2 pb-[max(0.5rem,env(safe-area-inset-bottom))]">
        <div className="flex justify-around">
          {tabs.map(t => (
            <button key={t.id} onClick={() => { setTab(t.id); if (t.id !== "collection") setQuickFilter(null); }} className="flex flex-col items-center gap-1 px-3 py-1.5 rounded-[14px] min-w-[64px]">
              <t.icon size={20} className={tab === t.id ? "text-[#D4A24C]" : "text-[#5C574F]"} strokeWidth={tab === t.id ? 2.5 : 2} />
              <span className={`text-[10px] font-body ${tab === t.id ? "text-[#D4A24C] font-semibold" : "text-[#5C574F]"}`}>{t.label}</span>
              <div className={`h-0.5 w-5 rounded-full ${tab === t.id ? "bg-[#D4A24C]" : "bg-transparent"}`} />
            </button>
          ))}
        </div>
      </div>
      {detailGame && (
        <GameDetailModal
          game={detailGame}
          plays={displayPlays}
          onClose={() => setDetailGame(null)}
          onEdit={demoMode ? null : () => { setGameModal({ editing: detailGame }); setDetailGame(null); }}
        />
      )}
      {gameModal && (
        <GameFormModal
          initial={gameModal.editing}
          categoryOptions={categoryOptions}
          mechanismOptions={mechanismOptions}
          publisherOptions={publisherOptions}
          onAddCategory={addCustomCategory}
          onAddMechanism={addCustomMechanism}
          onClose={() => setGameModal(null)}
          onSave={saveGame}
          onDelete={deleteGame}
        />
      )}
      {playModal && <PlayFormModal games={games} initial={playModal.editing} onClose={() => setPlayModal(null)} onSave={savePlay} onDelete={deletePlay} />}
      {syncModalOpen && (
        <SyncModal
          initialUrl={syncUrl}
          status={syncStatus}
          lastSynced={lastSynced}
          onClose={() => setSyncModalOpen(false)}
          onSave={saveSyncUrl}
          onSyncNow={syncNow}
          onRemove={removeSync}
        />
      )}
      {settingsModalOpen && (
        <SettingsModal
          customCategories={customCategories}
          customMechanisms={customMechanisms}
          onAddCategory={addCustomCategory}
          onRemoveCategory={removeCustomCategory}
          onAddMechanism={addCustomMechanism}
          onRemoveMechanism={removeCustomMechanism}
          demoMode={demoMode}
          onToggleDemo={() => { setDemoMode((d) => !d); setSettingsModalOpen(false); }}
          onClose={() => setSettingsModalOpen(false)}
        />
      )}
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
