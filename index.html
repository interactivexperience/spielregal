/* ---------------- STORAGE (localStorage, this file runs standalone) ---------------- */
const GAMES_KEY = "spielregal:games";
const PLAYS_KEY = "spielregal:plays";
const SYNC_URL_KEY = "spielregal:syncUrl";
const LOCAL_TS_KEY = "spielregal:localTs";
const loadKey = (key, fallback) => {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch (e) { return fallback; }
};
const saveKey = (key, value) => {
  try { localStorage.setItem(key, JSON.stringify(value)); }

};
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

/* ---------------- CLOUD SYNC (Firebase Realtime Database REST API) ---------------- */
function normalizeSyncUrl(url) {
  if (!url) return "";
  let u = url.trim();
  if (!u) return "";
  if (!u.endsWith("/")) u += "/";
  return u;
}
async function cloudPush(syncUrl, games, plays) {
  const base = normalizeSyncUrl(syncUrl);
  if (!base) return;
  const payload = { games, plays, updatedAt: Date.now() };
  const res = await fetch(base + "data.json", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error("Cloud-Speichern fehlgeschlagen");
  return payload.updatedAt;
}
async function cloudPull(syncUrl) {
  const base = normalizeSyncUrl(syncUrl);
  if (!base) return null;
  const res = await fetch(base + "data.json");
  if (!res.ok) throw new Error("Cloud-Abruf fehlgeschlagen");
  const json = await res.json();
  return json;
}

/* ---------------- BGG API (best effort, needs internet) ---------------- */
async function bggSearch(query) {
  const url = `https://boardgamegeek.com/xmlapi2/search?query=${encodeURIComponent(query)}&type=boardgame`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("BGG nicht erreichbar");
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, "text/xml");
  const items = Array.from(xml.getElementsByTagName("item")).slice(0, 8);
  return items.map((it) => ({
    bggId: it.getAttribute("id"),
    name: it.getElementsByTagName("name")[0]?.getAttribute("value") || "Unbekannt",
    year: it.getElementsByTagName("yearpublished")[0]?.getAttribute("value") || "",
  }));
}
async function bggThing(bggId) {
  const url = `https://boardgamegeek.com/xmlapi2/thing?id=${bggId}&stats=1`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("BGG nicht erreichbar");
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, "text/xml");
  const item = xml.getElementsByTagName("item")[0];
  if (!item) throw new Error("Kein Ergebnis");
  const nameEl = Array.from(item.getElementsByTagName("name")).find(n => n.getAttribute("type") === "primary") || item.getElementsByTagName("name")[0];
  const getTxt = (tag) => item.getElementsByTagName(tag)[0]?.textContent || "";
  const getAttr = (tag) => item.getElementsByTagName(tag)[0]?.getAttribute("value") || "";
  const mechanisms = Array.from(item.getElementsByTagName("link")).filter(l => l.getAttribute("type") === "boardgamemechanic").map(l => l.getAttribute("value"));
  const categories = Array.from(item.getElementsByTagName("link")).filter(l => l.getAttribute("type") === "boardgamecategory").map(l => l.getAttribute("value"));
  const publisher = Array.from(item.getElementsByTagName("link")).find(l => l.getAttribute("type") === "boardgamepublisher")?.getAttribute("value") || "";
  const weight = item.getElementsByTagName("averageweight")[0]?.getAttribute("value");
  return {
    bggId, name: nameEl?.getAttribute("value") || "Unbekannt", year: getAttr("yearpublished"),
    image: getTxt("image"), minPlayers: getAttr("minplayers"), maxPlayers: getAttr("maxplayers"),
    minTime: getAttr("minplaytime"), maxTime: getAttr("maxplaytime"), age: getAttr("minage"),
    publisher, mechanisms, categories,
    complexity: weight ? Math.round(parseFloat(weight) * 10) / 10 : null,
  };
}

    id: uid(), bggId: "", name: "", year: "", publisher: "", image: "",
    minPlayers: "", maxPlayers: "", minTime: "", maxTime: "", age: "",
    complexity: "", mechanisms: [], categories: [], status: "owned",
    location: "", notes: "", rating: "", addedDate: new Date().toISOString().slice(0, 10),
  });

  const runSearch = async () => {
    if (!query.trim()) return;
    setSearching(true); setSearchError("");
    try {
      const r = await bggSearch(query);
      setResults(r);
      if (r.length === 0) setSearchError("Keine Treffer bei BGG. Manuell anlegen?");
    } catch (e) { setSearchError("BGG ist gerade nicht erreichbar. Bitte manuell anlegen."); }
    finally { setSearching(false); }
  };

  const pickResult = async (r) => {
    setSearching(true);
    try {
      const details = await bggThing(r.bggId);
      setForm((f) => ({ ...f, ...details, status: "owned", addedDate: f.addedDate }));
      setStep("manual");
    } catch (e) {
      setForm((f) => ({ ...f, name: r.name, year: r.year, bggId: r.bggId }));
      setStep("manual");
    } finally { setSearching(false); }
  };

  const update = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  return (
    <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-0 sm:p-6">

              <input autoFocus value={query} onChange={(e) => setQuery(e.target.value)} onKeyDown={(e) => e.key === "Enter" && runSearch()}

              <button onClick={runSearch} className="bg-[#C1443C] text-[#F2EDE4] px-4 rounded-xl flex items-center justify-center active:scale-95">

            </div>
            {searchError && <p className="text-sm text-[#D4A24C] font-body">{searchError}</p>}
            <div className="space-y-2">

                  <span className="font-body text-[#F2EDE4]">{r.name} <span className="text-[#5C574F]">({r.year || "?"})</span></span>
                  <ChevronRight size={16} className="text-[#5C574F]" />
                </button>
              ))}
            </div>
            <button onClick={() => setStep("manual")} className="w-full text-center py-3 text-[#A39C8F] font-body text-sm border-t border-[#3A3631] pt-4">
              Stattdessen manuell anlegen →
            </button>
          </div>
        )}

        {step === "manual" && (
          <div className="p-5 space-y-4 font-body">
            <div className="flex gap-3 items-start">
              <Cover game={form} />
              <div className="flex-1 space-y-2">
                <input value={form.name} onChange={(e) => update("name", e.target.value)} placeholder="Titel *"
                  className="w-full bg-[#262422] border border-[#3A3631] rounded-lg px-3 py-2 text-[#F2EDE4] focus:outline-none focus:border-[#D4A24C]" />

function PlayFormModal({ games, onClose, onSave }) {

/* ---------------- DASHBOARD ---------------- */
function Dashboard({ games, plays, onQuickFilter }) {
  const owned = games.filter(g => g.status === "owned");
  const playCounts = useMemo(() => {
    const map = {}; plays.forEach(p => { map[p.gameId] = (map[p.gameId] || 0) + 1; }); return map;
  }, [plays]);
  const lastPlays = [...plays].sort((a, b) => (b.date || "").localeCompare(a.date || "")).slice(0, 5);
  const dustCollectors = owned.filter(g => !playCounts[g.id]).sort((a, b) => (a.addedDate || "").localeCompare(b.addedDate || "")).slice(0, 5);
  const complexGames = owned.filter(g => g.complexity);
  const avgComplexity = complexGames.length ? (complexGames.reduce((s, g) => s + parseFloat(g.complexity), 0) / complexGames.length).toFixed(1) : "—";
  const thirtyDaysAgo = new Date(); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
  const recentPlayCounts = {};
  plays.forEach(p => { if (p.date && new Date(p.date) >= thirtyDaysAgo) recentPlayCounts[p.gameId] = (recentPlayCounts[p.gameId] || 0) + 1; });
  const topMonth = Object.entries(recentPlayCounts).sort((a, b) => b[1] - a[1])[0];
  const topMonthGame = topMonth ? games.find(g => g.id === topMonth[0]) : null;
  const digitalCount = plays.filter(p => p.mode === "bga").length;
  const physicalCount = plays.filter(p => p.mode !== "bga").length;

  return (
    <div className="p-5 space-y-5 pb-28">
      <div>
        <p className="text-[#5C574F] font-body text-sm">{new Date().toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "long" })}</p>
        <h1 className="font-display text-3xl text-[#F2EDE4] mt-0.5">Spielregal</h1>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-4">
          <p className="text-[#5C574F] text-xs font-body">Sammlung</p>
          <p className="font-display text-3xl text-[#F2EDE4] mt-1">{owned.length}</p>
          <p className="text-[#A39C8F] text-xs font-body mt-0.5">Spiele im Regal</p>
        </div>
        <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-4">
          <p className="text-[#5C574F] text-xs font-body">Ø Komplexität</p>
          <p className="font-display text-3xl text-[#F2EDE4] mt-1">{avgComplexity}</p>
          <p className="text-[#A39C8F] text-xs font-body mt-0.5">von 5</p>
        </div>
      </div>
      {topMonthGame && (
        <div className="bg-gradient-to-r from-[#D4A24C]/15 to-transparent border border-[#D4A24C]/30 rounded-2xl p-4 flex items-center gap-3">
          <TrendingUp className="text-[#D4A24C]" size={22} />
          <div>
            <p className="text-[#D4A24C] text-xs font-body font-medium">Spiel des Monats</p>
            <p className="text-[#F2EDE4] font-display text-lg">{topMonthGame.name} · {topMonth[1]}× gespielt</p>
          </div>
        </div>
      )}
      <div>
        <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-2">Schnellfilter</h2>
        <div className="flex gap-2 overflow-x-auto pb-1">
          {[
            { label: "2 Spieler", fn: g => parseInt(g.minPlayers) <= 2 && parseInt(g.maxPlayers) >= 2 },
            { label: "Unter 30 Min", fn: g => g.minTime && parseInt(g.minTime) <= 30 },
            { label: "Noch nie gespielt", fn: g => !playCounts[g.id] },
          ].map(f => (
            <button key={f.label} onClick={() => onQuickFilter(f.fn)} className="whitespace-nowrap px-4 py-2 bg-[#262422] border border-[#3A3631] rounded-full text-sm font-body text-[#F2EDE4]">{f.label}</button>
          ))}
        </div>
      </div>
      <div>
        <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-2">Zuletzt gespielt</h2>
        {lastPlays.length === 0 ? <p className="text-[#5C574F] text-sm font-body">Noch keine Partien eingetragen.</p> : (
          <div className="space-y-2">
            {lastPlays.map(p => (
              <div key={p.id} className="bg-[#262422] border border-[#3A3631] rounded-xl px-4 py-3 flex items-center justify-between">
                <div><p className="text-[#F2EDE4] font-body">{p.gameName}</p><p className="text-[#5C574F] text-xs font-body">{p.date}</p></div>
                <Pill tone={p.mode === "bga" ? "teal" : "default"}>{p.mode === "bga" ? "BGA" : p.mode === "physical-other" ? "Geliehen" : "Sammlung"}</Pill>
              </div>
            ))}
          </div>
        )}
      </div>
      <div>
        <div className="flex items-center gap-2 mb-2"><Archive size={15} className="text-[#5C574F]" /><h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide">Staubfänger</h2></div>
        {dustCollectors.length === 0 ? <p className="text-[#5C574F] text-sm font-body">Alles im Regal wurde schon gespielt. Sehr gut!</p> : (
          <div className="space-y-2">
            {dustCollectors.map(g => (
              <div key={g.id} className="bg-[#262422] border border-[#3A3631] rounded-xl px-4 py-3 flex items-center gap-3">
                <Cover game={g} size="sm" />
                <div className="flex-1"><p className="text-[#F2EDE4] font-body">{g.name}</p><p className="text-[#5C574F] text-xs font-body">seit {g.addedDate || "?"} ungespielt</p></div>
              </div>

      </div>
      {plays.length > 0 && (
        <div className="bg-[#262422] border border-[#3A3631] rounded-2xl p-4">

          <div className="flex items-center gap-2">
            <div className="flex-1 h-2.5 rounded-full bg-[#3A3631] overflow-hidden flex">
              <div className="bg-[#C1443C] h-full" style={{ width: `${(physicalCount / plays.length) * 100}%` }} />
              <div className="bg-[#4E8C82] h-full" style={{ width: `${(digitalCount / plays.length) * 100}%` }} />
            </div>
          </div>
          <div className="flex justify-between mt-2 text-xs font-body"><span className="text-[#C1443C]">{physicalCount} physisch</span><span className="text-[#4E8C82]">{digitalCount} BGA</span></div>
        </div>
      )}
    </div>
  );
}

/* ---------------- COLLECTION ---------------- */

    const map = {}; plays.forEach(p => { map[p.gameId] = (map[p.gameId] || 0) + 1; }); return map;

  if (query) list = list.filter(g => g.name.toLowerCase().includes(query.toLowerCase()));
  if (filterFn) list = list.filter(filterFn);

  return (
    <div className="p-5 pb-28">
      <div className="flex items-center justify-between mb-4">
        <h1 className="font-display text-3xl text-[#F2EDE4]">Sammlung</h1>
        <button onClick={onAdd} className="bg-[#C1443C] text-[#F2EDE4] p-2.5 rounded-xl active:scale-95"><Plus size={20} /></button>
      </div>
      <div className="relative mb-3">
        <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5C574F]" />
        <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Suchen…"
          className="w-full bg-[#262422] border border-[#3A3631] rounded-xl pl-9 pr-3 py-2.5 text-[#F2EDE4] text-sm font-body placeholder-[#5C574F] focus:outline-none focus:border-[#D4A24C]" />
      </div>
      <div className="flex gap-2 mb-2">
        {[{ v: "owned", label: "Besitz" }, { v: "wishlist", label: "Wunschliste" }, { v: "all", label: "Alle" }].map(s => (
          <button key={s.v} onClick={() => setStatusFilter(s.v)}

                {g.minTime && <span className="flex items-center gap-0.5 text-[10px] text-[#A39C8F] font-mono"><Clock size={10} /> {g.minTime}'</span>}

/* ---------------- RECOMMENDATIONS ---------------- */
function Recommendations({ games, plays }) {
  const [discovering, setDiscovering] = useState(false);
  const [external, setExternal] = useState([]);
  const [externalError, setExternalError] = useState("");
  const playedIds = new Set(plays.map(p => p.gameId));
  const profile = useMemo(() => {
    const rated = games.filter(g => g.rating && parseFloat(g.rating) >= 8);
    const tagCount = {};
    rated.forEach(g => { [...(g.mechanisms || []), ...(g.categories || [])].forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; }); });
    return Object.entries(tagCount).sort((a, b) => b[1] - a[1]);
  }, [games]);
  const unplayed = games.filter(g => !playedIds.has(g.id));
  const scored = unplayed.map(g => {
    const tags = [...(g.mechanisms || []), ...(g.categories || [])];
    const score = profile.reduce((s, [tag, weight]) => (tags.includes(tag) ? s + weight : s), 0);
    return { game: g, score };
  }).filter(x => x.score > 0).sort((a, b) => b.score - a.score).slice(0, 8);
  const topTag = profile[0] ? profile[0][0] : null;

  const discoverNew = async () => {
    if (!topTag) return;
    setDiscovering(true); setExternalError("");
    try {
      const r = await bggSearch(topTag);
      const ownedNames = new Set(games.map(g => g.name.toLowerCase()));
      setExternal(r.filter(x => !ownedNames.has(x.name.toLowerCase())).slice(0, 6));
    } catch (e) { setExternalError("BGG ist gerade nicht erreichbar — externe Vorschläge sind offline nicht möglich."); }
    finally { setDiscovering(false); }
  };

  return (
    <div className="p-5 pb-28">
      <h1 className="font-display text-3xl text-[#F2EDE4] mb-1">Empfehlungen</h1>
      <p className="text-[#A39C8F] text-sm font-body mb-5">Basierend auf Spielen, die du mit 8+ bewertet hast — egal ob eigene Sammlung, geliehen oder BGA.</p>
      {profile.length === 0 ? (
        <p className="text-[#5C574F] text-sm font-body">Bewerte ein paar gespielte Spiele mit 8 oder höher, damit ich ein Geschmacksprofil erstellen kann.</p>
      ) : (
        <>
          <div className="mb-6">
            <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide mb-2">Ungespielt, passt zu dir</h2>
            {scored.length === 0 ? <p className="text-[#5C574F] text-sm font-body">Kein ungespieltes Spiel überschneidet sich aktuell mit deinem Profil.</p> : (
              <div className="space-y-2">
                {scored.map(({ game }) => {
                  const tags = [...(game.mechanisms || []), ...(game.categories || [])];
                  const match = profile.find(([t]) => tags.includes(t));
                  const matchTag = match ? match[0] : null;
                  return (
                    <div key={game.id} className="bg-[#262422] border border-[#3A3631] rounded-xl px-4 py-3 flex items-center gap-3">
                      <Cover game={game} size="sm" />
                      <div className="flex-1 min-w-0">
                        <p className="text-[#F2EDE4] font-body truncate">{game.name}</p>
                        {matchTag && <p className="text-[#5C574F] text-xs font-body">Ähnlich wie deine Favoriten: {matchTag}</p>}
                      </div>
                      <Pill tone={game.status === "owned" ? "teal" : "amber"}>{game.status === "owned" ? "besitzt du" : "nicht in Sammlung"}</Pill>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          <div>
            <div className="flex items-center justify-between mb-2">
              <h2 className="font-body text-sm font-semibold text-[#A39C8F] uppercase tracking-wide">Neu entdecken</h2>
              <button onClick={discoverNew} disabled={discovering} className="flex items-center gap-1.5 text-xs font-body text-[#D4A24C] disabled:opacity-50">
                {discovering ? <Loader2 size={13} /> : <Sparkles size={13} />}{topTag ? `Nach "${topTag}" suchen` : "Suchen"}
              </button>
            </div>
            {externalError && <p className="text-sm text-[#D4A24C] font-body">{externalError}</p>}
            {external.length > 0 && (
              <div className="space-y-2">
                {external.map(r => (
                  <div key={r.bggId} className="bg-[#262422] border border-[#3A3631] rounded-xl px-4 py-3 flex items-center justify-between">
                    <span className="text-[#F2EDE4] font-body">{r.name} <span className="text-[#5C574F]">({r.year})</span></span>
                    <Pill tone="red">nicht in Sammlung</Pill>
                  </div>
                ))}
              </div>
            )}
            {external.length === 0 && !externalError && <p className="text-[#5C574F] text-sm font-body">Tippe auf „Suchen", um passende neue Spiele bei BGG zu finden (benötigt Internetzugriff).</p>}
          </div>
        </>
      )}
    </div>
  );
}

            {status === "syncing" && <><Loader2 size={13} /> <span className="text-[#A39C8F]">Synchronisiere…</span></>}
            {status === "synced" && <span className="text-[#4E8C82]">Zuletzt synchronisiert: {lastSynced ? new Date(lastSynced).toLocaleTimeString("de-DE") : "gerade eben"}</span>}
            {status === "error" && <span className="text-[#C1443C]">Synchronisation fehlgeschlagen — Internet oder Adresse prüfen</span>}
            {status === "idle" && !initialUrl && <span className="text-[#5C574F]">Noch nicht eingerichtet</span>}
          </div>
          <button
            onClick={() => onSave(url)}
            disabled={!url.trim()}
            className="w-full bg-[#4E8C82] disabled:opacity-40 text-[#F2EDE4] rounded-xl py-3 font-medium active:scale-[0.99] flex items-center justify-center gap-2"
          >
            <Check size={18} /> Speichern
          </button>
          {initialUrl && (
            <>
              <button onClick={onSyncNow} className="w-full bg-[#262422] border border-[#3A3631] text-[#F2EDE4] rounded-xl py-3 font-medium active:scale-[0.99]">
                Jetzt synchronisieren
              </button>
              <button onClick={onRemove} className="w-full text-[#C1443C] text-sm font-body py-2">
                Sync auf diesem Gerät entfernen
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------------- MAIN APP ---------------- */
function App() {
  const [games, setGames] = useState(() => loadKey(GAMES_KEY, []));
  const [plays, setPlays] = useState(() => loadKey(PLAYS_KEY, []));
  const [tab, setTab] = useState("dashboard");
  const [gameModal, setGameModal] = useState(null);
  const [playModal, setPlayModal] = useState(false);
  const [quickFilter, setQuickFilter] = useState(null);
  const [syncUrl, setSyncUrl] = useState(() => localStorage.getItem(SYNC_URL_KEY) || "");
  const [syncModalOpen, setSyncModalOpen] = useState(false);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [lastSynced, setLastSynced] = useState(null);
  const skipNextPush = React.useRef(true);
  const pushTimer = React.useRef(null);

  useEffect(() => { saveKey(GAMES_KEY, games); }, [games]);
  useEffect(() => { saveKey(PLAYS_KEY, plays); }, [plays]);

  // On mount: if a sync URL is saved, pull remote data and adopt it if newer than local.
  useEffect(() => {
    if (!syncUrl) return;
    setSyncStatus("syncing");
    cloudPull(syncUrl).then((remote) => {
      const localTs = parseInt(localStorage.getItem(LOCAL_TS_KEY) || "0", 10);
      if (remote && remote.updatedAt && remote.updatedAt > localTs) {
        setGames(remote.games || []);
        setPlays(remote.plays || []);
        localStorage.setItem(LOCAL_TS_KEY, String(remote.updatedAt));
      }
      setSyncStatus("synced");
      setLastSynced(Date.now());
      skipNextPush.current = true;
    }).catch(() => setSyncStatus("error"));
  }, []);

  // Push to cloud (debounced) whenever games/plays change, after initial load.
  useEffect(() => {
    if (!syncUrl) return;
    if (skipNextPush.current) { skipNextPush.current = false; return; }
    if (pushTimer.current) clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(() => {
      setSyncStatus("syncing");
      cloudPush(syncUrl, games, plays).then((ts) => {
        localStorage.setItem(LOCAL_TS_KEY, String(ts));
        setSyncStatus("synced");
        setLastSynced(Date.now());
      }).catch(() => setSyncStatus("error"));
    }, 1200);
    return () => clearTimeout(pushTimer.current);
  }, [games, plays, syncUrl]);

  const saveSyncUrl = (url) => {
    const trimmed = url.trim();
    localStorage.setItem(SYNC_URL_KEY, trimmed);
    setSyncUrl(trimmed);
    skipNextPush.current = true;
    setSyncStatus("syncing");
    cloudPull(trimmed).then((remote) => {
      const localTs = parseInt(localStorage.getItem(LOCAL_TS_KEY) || "0", 10);
      if (remote && remote.updatedAt && remote.updatedAt > localTs) {
        setGames(remote.games || []);
        setPlays(remote.plays || []);
        localStorage.setItem(LOCAL_TS_KEY, String(remote.updatedAt));
      } else {
        cloudPush(trimmed, games, plays).then((ts) => localStorage.setItem(LOCAL_TS_KEY, String(ts)));
      }
      setSyncStatus("synced");
      setLastSynced(Date.now());
    }).catch(() => setSyncStatus("error"));
    setSyncModalOpen(false);
  };

  const syncNow = () => {
    if (!syncUrl) return;
    setSyncStatus("syncing");
    cloudPush(syncUrl, games, plays).then((ts) => {
      localStorage.setItem(LOCAL_TS_KEY, String(ts));
      setSyncStatus("synced");
      setLastSynced(Date.now());
    }).catch(() => setSyncStatus("error"));
  };

  const removeSync = () => {
    localStorage.removeItem(SYNC_URL_KEY);
    setSyncUrl("");
    setSyncStatus("idle");
    setSyncModalOpen(false);
  };

  const saveGame = (game) => {
    setGames(prev => { const exists = prev.find(g => g.id === game.id); return exists ? prev.map(g => g.id === game.id ? game : g) : [...prev, game]; });
    setGameModal(null);
  };
  const deleteGame = (id) => { setGames(prev => prev.filter(g => g.id !== id)); setGameModal(null); };
  const savePlay = (play) => { setPlays(prev => [...prev, play]); setPlayModal(false); };
  const deletePlay = (id) => setPlays(prev => prev.filter(p => p.id !== id));

  const tabs = [
    { id: "dashboard", label: "Übersicht", icon: Home },
    { id: "collection", label: "Sammlung", icon: Library },
    { id: "playlog", label: "Partien", icon: ListChecks },
    { id: "recommendations", label: "Ideen", icon: Sparkles },
  ];

  return (
    <div className="min-h-screen bg-[#1C1B1A] font-body flex flex-col max-w-3xl mx-auto relative">
      <button
        onClick={() => setSyncModalOpen(true)}
        className="fixed top-4 right-4 z-40 bg-[#262422] border border-[#3A3631] rounded-full p-2.5 active:scale-95"
        aria-label="Synchronisation"
      >
        {syncStatus === "syncing" ? (
          <Loader2 size={16} className="text-[#D4A24C]" />
        ) : syncUrl ? (
          <Globe size={16} className={syncStatus === "error" ? "text-[#C1443C]" : "text-[#4E8C82]"} />
        ) : (
          <Globe size={16} className="text-[#5C574F]" />
        )}
      </button>
      <div className="flex-1 overflow-y-auto">
        {tab === "dashboard" && <Dashboard games={games} plays={plays} onQuickFilter={(fn) => { setQuickFilter(() => fn); setTab("collection"); }} />}
        {tab === "collection" && <Collection games={games} plays={plays} filterFn={quickFilter} clearFilter={() => setQuickFilter(null)} onAdd={() => setGameModal({ editing: null })} onEdit={(g) => setGameModal({ editing: g })} />}
        {tab === "playlog" && <PlayLog plays={plays} onAdd={() => setPlayModal(true)} onDelete={deletePlay} />}
        {tab === "recommendations" && <Recommendations games={games} plays={plays} />}
      </div>
      <div className="sticky bottom-0 bg-[#1C1B1A] border-t border-[#3A3631] px-2 pt-2 pb-[max(0.5rem,env(safe-area-inset-bottom))]">
        <div className="flex justify-around">
          {tabs.map(t => (
            <button key={t.id} onClick={() => { setTab(t.id); if (t.id !== "collection") setQuickFilter(null); }} className="flex flex-col items-center gap-1 px-3 py-1.5 rounded-xl min-w-[64px]">
              <t.icon size={20} className={tab === t.id ? "text-[#D4A24C]" : "text-[#5C574F]"} strokeWidth={tab === t.id ? 2.5 : 2} />
              <span className={`text-[10px] font-body ${tab === t.id ? "text-[#D4A24C] font-semibold" : "text-[#5C574F]"}`}>{t.label}</span>
              <div className={`h-0.5 w-5 rounded-full ${tab === t.id ? "bg-[#D4A24C]" : "bg-transparent"}`} />
            </button>
          ))}
        </div>
      </div>
      {gameModal && <GameFormModal initial={gameModal.editing} onClose={() => setGameModal(null)} onSave={saveGame} onDelete={deleteGame} />}
      {playModal && <PlayFormModal games={games} onClose={() => setPlayModal(false)} onSave={savePlay} />}
      {syncModalOpen && (
        <SyncModal
          initialUrl={syncUrl}
          status={syncStatus}
          lastSynced={lastSynced}
          onClose={() => setSyncModalOpen(false)}
          onSave={saveSyncUrl}
          onSyncNow={syncNow}
          onRemove={removeSync}
        />
      )}
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
