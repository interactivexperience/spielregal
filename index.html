function App() {
  const [games, setGames] = useState([]);
  const [plays, setPlays] = useState([]);
  const [customCategories, setCustomCategories] = useState([]);
  const [customMechanisms, setCustomMechanisms] = useState([]);
  const [customPlayerTypes, setCustomPlayerTypes] = useState([]);
  const [customPlayerTypeDescriptions, setCustomPlayerTypeDescriptions] = useState({});
  const [settingsModalOpen, setSettingsModalOpen] = useState(false);
  const [commandBarOpen, setCommandBarOpen] = useState(false);
  const [demoMode, setDemoMode] = useState(false);
  const [lists, setLists] = useState([]);
  const [players, setPlayersList] = useState([]);
  const [celebrate, setCelebrate] = useState(false);

  // Whenever anything becomes focused — a text field, a textarea, or a dropdown/picker
  // button — make sure it's actually within the visible area (keyboard included).
  useEffect(() => {
    const onFocusIn = (e) => {
      const el = e.target;
      if (!el || typeof el.scrollIntoView !== "function") return;
      const tag = el.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "BUTTON" || tag === "SELECT" || el.isContentEditable) {
        setTimeout(() => { el.scrollIntoView({ block: "nearest", behavior: "smooth" }); }, 300);
      }
    };
    document.addEventListener("focusin", onFocusIn);
    return () => document.removeEventListener("focusin", onFocusIn);
  }, []);
  const [dashboardOrder, setDashboardOrder] = useState(() => {
    try { const saved = localStorage.getItem("spielregal:dashboardOrder"); return saved ? JSON.parse(saved) : DEFAULT_DASHBOARD_ORDER; }
    catch { return DEFAULT_DASHBOARD_ORDER; }
  });
  useEffect(() => { try { localStorage.setItem("spielregal:dashboardOrder", JSON.stringify(dashboardOrder)); } catch {} }, [dashboardOrder]);
  const moveDashboardSection = (key, dir) => {
    setDashboardOrder((prev) => {
      const arr = [...prev];
      const i = arr.indexOf(key);
      const j = i + dir;
      if (i < 0 || j < 0 || j >= arr.length) return prev;
      [arr[i], arr[j]] = [arr[j], arr[i]];
      return arr;
    });
  };
  const displayGames = demoMode ? DEMO_GAMES : games;
  const displayPlays = demoMode ? DEMO_PLAYS : plays;
  const displayLists = demoMode ? DEMO_LISTS : lists;
  const displayPlayers = demoMode ? DEMO_PLAYERS : players;
  const [tab, setTab] = useState("dashboard");
  const [gameModal, setGameModal] = useState(null);
  const [detailGame, setDetailGame] = useState(null);
  const [detailList, setDetailList] = useState(null);
  const [playModal, setPlayModal] = useState(null);
  const [quickFilter, setQuickFilter] = useState(null);
  const [syncUrl, setSyncUrl] = useState(() => localStorage.getItem(SYNC_URL_KEY) || "");
  const [syncModalOpen, setSyncModalOpen] = useState(!localStorage.getItem(SYNC_URL_KEY));
  const [syncStatus, setSyncStatus] = useState("idle");
  const [lastSynced, setLastSynced] = useState(null);
  const categoryOptions = useMemo(() => {
    const merged = [...DEFAULT_CATEGORIES];
    customCategories.forEach((c) => { if (!merged.includes(c)) merged.push(c); });
    return merged;
  }, [customCategories]);
  const mechanismOptions = useMemo(() => {
    const merged = [...DEFAULT_MECHANISMS];
    customMechanisms.forEach((m) => { if (!merged.includes(m)) merged.push(m); });
    return merged;
  }, [customMechanisms]);
  const playerTypeOptions = useMemo(() => {
    const merged = [...DEFAULT_PLAYER_TYPES];
    customPlayerTypes.forEach((t) => { if (!merged.includes(t)) merged.push(t); });
    return merged;
  }, [customPlayerTypes]);
  const publisherOptions = useMemo(() => {
    const set = new Set();
    games.forEach((g) => (g.publishers || []).forEach((p) => set.add(p)));
    return Array.from(set).sort();
  }, [games]);
  const designerOptions = useMemo(() => {
    const set = new Set();
    games.forEach((g) => (g.designers || []).forEach((d) => set.add(d)));
    return Array.from(set).sort();
  }, [games]);
  const addCustomCategory = (name) => setCustomCategories((prev) => (prev.includes(name) || DEFAULT_CATEGORIES.includes(name) ? prev : [...prev, name]));
  const removeCustomCategory = (name) => setCustomCategories((prev) => prev.filter((c) => c !== name));
  const addCustomMechanism = (name) => setCustomMechanisms((prev) => (prev.includes(name) || DEFAULT_MECHANISMS.includes(name) ? prev : [...prev, name]));
  const removeCustomMechanism = (name) => setCustomMechanisms((prev) => prev.filter((m) => m !== name));
  const addCustomPlayerType = (name, description) => {
    setCustomPlayerTypes((prev) => (prev.includes(name) || DEFAULT_PLAYER_TYPES.includes(name) ? prev : [...prev, name]));
    if (description && description.trim()) {
      setCustomPlayerTypeDescriptions((prev) => ({ ...prev, [name]: description.trim() }));
    }
  };
  const removeCustomPlayerType = (name) => {
    setCustomPlayerTypes((prev) => prev.filter((t) => t !== name));
    setCustomPlayerTypeDescriptions((prev) => { const next = { ...prev }; delete next[name]; return next; });
  };
  const addList = (name) => {
    const list = { id: uid(), name, gameIds: [] };
    setLists((prev) => [...prev, list]);
    return list.id;
  };
  const removeList = (id) => setLists((prev) => prev.filter((l) => l.id !== id));
  const toggleGameInList = (listId, gameId) => {
    setLists((prev) => prev.map((l) => {
      if (l.id !== listId) return l;
      const has = l.gameIds.includes(gameId);
      return { ...l, gameIds: has ? l.gameIds.filter((id) => id !== gameId) : [...l.gameIds, gameId] };
    }));
  };
  const addPlayer = (name, photo) => {
    const p = { id: uid(), name, photo: photo || "" };
    setPlayersList((prev) => [...prev, p]);
    return p.id;
  };
  const updatePlayerPhoto = (id, photo) => setPlayersList((prev) => prev.map((p) => (p.id === id ? { ...p, photo } : p)));
  const removePlayer = (id) => setPlayersList((prev) => prev.filter((p) => p.id !== id));
  const skipNextPush = React.useRef(true);
  const pushTimer = React.useRef(null);
  const scrollElRef = React.useRef(null);
  const touchStartY = React.useRef(0);
  const tracking = React.useRef(false);
  const [pullY, setPullY] = useState(0);
  const [refreshing, setRefreshing] = useState(false);
  const PULL_THRESHOLD = 70;

  const pullLatest = () => {
    setRefreshing(true);
    // Force a truly fresh load of the app itself (bypasses any stale cached version,
    // including the stubborn home-screen-icon cache) — safe because nothing is stored
    // locally; all data lives in Firebase and reloads automatically on next mount.
    const url = window.location.pathname + "?refresh=" + Date.now() + window.location.hash;
    window.location.href = url;
  };

  const onTouchStart = (e) => {
    if (scrollElRef.current && scrollElRef.current.scrollTop <= 0) {
      touchStartY.current = e.touches[0].clientY;
      tracking.current = true;
    }
  };
  const onTouchMove = (e) => {
    if (!tracking.current || refreshing) return;
    const delta = e.touches[0].clientY - touchStartY.current;
    if (delta > 0 && scrollElRef.current && scrollElRef.current.scrollTop <= 0) {
      setPullY(Math.min(delta * 0.5, 110));
    } else {
      tracking.current = false;
      setPullY(0);
    }
  };
  const onTouchEnd = () => {
    if (!tracking.current) return;
    tracking.current = false;
    if (pullY >= PULL_THRESHOLD) {
      setPullY(56);
      pullLatest();
    } else {
      setPullY(0);
    }
  };

  // On mount: load data directly from Firebase — this is the sole source of truth, nothing persists locally.
  useEffect(() => {
    if (!syncUrl) return;
    setSyncStatus("syncing");
    cloudPull(syncUrl).then((remote) => {
      setGames((remote && remote.games) || []);
      setPlays((remote && remote.plays) || []);
      setCustomCategories((remote && remote.customCategories) || []);
      setCustomMechanisms((remote && remote.customMechanisms) || []);
      setCustomPlayerTypes((remote && remote.customPlayerTypes) || []);
      setCustomPlayerTypeDescriptions((remote && remote.customPlayerTypeDescriptions) || {});
      setLists((remote && remote.lists) || []);
      setPlayersList((remote && remote.players) || []);
      setSyncStatus("synced");
      setLastSynced(Date.now());
      skipNextPush.current = true;
    }).catch(() => setSyncStatus("error"));
  }, []);

  // Write to Firebase (debounced) whenever games/plays/taxonomy change. No local copy is kept anywhere else.
  useEffect(() => {
    if (!syncUrl) return;
    if (skipNextPush.current) { skipNextPush.current = false; return; }
    if (pushTimer.current) clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(() => {
      setSyncStatus("syncing");
      cloudPush(syncUrl, { games, plays, customCategories, customMechanisms, customPlayerTypes, customPlayerTypeDescriptions, lists, players }).then(() => {
        setSyncStatus("synced");
        setLastSynced(Date.now());
      }).catch(() => setSyncStatus("error"));
    }, 1200);
    return () => clearTimeout(pushTimer.current);
  }, [games, plays, customCategories, customMechanisms, customPlayerTypes, customPlayerTypeDescriptions, lists, players, syncUrl]);

  const saveSyncUrl = (url) => {
    const trimmed = url.trim();
    localStorage.setItem(SYNC_URL_KEY, trimmed);
    setSyncUrl(trimmed);
    skipNextPush.current = true;
    setSyncStatus("syncing");
    cloudPull(trimmed).then((remote) => {
      if (remote && (remote.games || remote.plays)) {
        setGames(remote.games || []);
        setPlays(remote.plays || []);
        setCustomCategories(remote.customCategories || []);
        setCustomMechanisms(remote.customMechanisms || []);
        setCustomPlayerTypes(remote.customPlayerTypes || []);
        setCustomPlayerTypeDescriptions(remote.customPlayerTypeDescriptions || {});
        setLists(remote.lists || []);
        setPlayersList(remote.players || []);
      } else {
        cloudPush(trimmed, { games, plays, customCategories, customMechanisms, customPlayerTypes, customPlayerTypeDescriptions, lists, players });
      }
      setSyncStatus("synced");
      setLastSynced(Date.now());
    }).catch(() => setSyncStatus("error"));
    setSyncModalOpen(false);
  };

  const syncNow = () => {
    if (!syncUrl) return;
    setSyncStatus("syncing");
    cloudPush(syncUrl, { games, plays, customCategories, customMechanisms, customPlayerTypes, customPlayerTypeDescriptions, lists, players }).then(() => {
      setSyncStatus("synced");
      setLastSynced(Date.now());
    }).catch(() => setSyncStatus("error"));
  };

  const removeSync = () => {
    localStorage.removeItem(SYNC_URL_KEY);
    setSyncUrl("");
    setSyncStatus("idle");
    setSyncModalOpen(false);
  };

  const saveGame = (game) => {
    setGames(prev => { const exists = prev.find(g => g.id === game.id); return exists ? prev.map(g => g.id === game.id ? game : g) : [...prev, game]; });
    setGameModal(null);
  };
  const deleteGame = (id) => { setGames(prev => prev.filter(g => g.id !== id)); setGameModal(null); };
  const addToWishlistFromRecommendation = (rec) => {
    setGames(prev => {
      if (rec.id && prev.some(g => g.id === rec.id)) {
        return prev.map(g => g.id === rec.id ? { ...g, status: "wishlist" } : g);
      }
      return [...prev, {
        id: uid(), bggId: rec.bggId || "", name: rec.name, year: rec.year || "",
        publishers: [], images: [], minPlayers: "", maxPlayers: "", bestPlayers: "",
        minTime: "", maxTime: "", age: "", complexity: "", mechanisms: [], categories: [],
        status: "wishlist", location: "", notes: "", rating: "", addedDate: new Date().toISOString().slice(0, 10),
      }];
    });
  };
  const savePlay = (play) => {
    setPlays(prev => {
      const exists = prev.find(p => p.id === play.id);
      if (!exists) { setCelebrate(true); playChime(); setTimeout(() => setCelebrate(false), 1600); }
      return exists ? prev.map(p => p.id === play.id ? play : p) : [...prev, play];
    });
    setPlayModal(null);
  };
  const deletePlay = (id) => { setPlays(prev => prev.filter(p => p.id !== id)); setPlayModal(null); };

  const tabs = [
    { id: "dashboard", label: "Übersicht", icon: Home },
    { id: "collection", label: "Sammlung", icon: Library },
    { id: "playlog", label: "Partien", icon: ListChecks },
    { id: "recommendations", label: "Ideen", icon: Sparkles },
    { id: "settings", label: "Einstellungen", icon: Settings },
  ];

  return (
    <div className="fixed inset-0 bg-[#1C1B1A] font-body flex flex-col max-w-3xl mx-auto overflow-hidden">
      <div className="shrink-0" style={{ paddingTop: "max(0.75rem, env(safe-area-inset-top))" }} />
      {demoMode && (
        <div className="shrink-0 mx-4 mb-2 px-3.5 py-2 bg-[#D4A24C]/15 border border-[#D4A24C]/30 rounded-[14px] flex items-center justify-between gap-2">
          <span className="text-xs text-[#D4A24C] font-medium">Demo-Vorschau — wird nicht gespeichert</span>
          <button onClick={() => setDemoMode(false)} className="text-xs text-[#D4A24C] underline shrink-0">Beenden</button>
        </div>
      )}
      <div
        ref={scrollElRef}
        className="flex-1 overflow-y-auto min-h-0"
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      >
        <div
          className="flex items-center justify-center overflow-hidden transition-[height] duration-200"
          style={{ height: pullY }}
        >
          <Loader2
            size={20}
            className={refreshing ? "text-[#D4A24C]" : "text-[#5C574F]"}
            style={{ opacity: Math.min(pullY / PULL_THRESHOLD, 1) }}
          />
        </div>
        <div key={tab} className="tab-fade">
          {tab === "dashboard" && <Dashboard games={displayGames} plays={displayPlays} onQuickFilter={(fn) => { setQuickFilter(() => fn); setTab("collection"); }} onView={(g) => setDetailGame(g)} sectionOrder={dashboardOrder} onReorder={setDashboardOrder} onSearch={() => setCommandBarOpen(true)} />}
          {tab === "collection" && <Collection games={displayGames} plays={displayPlays} filterFn={quickFilter} clearFilter={() => setQuickFilter(null)} onAdd={() => !demoMode && setGameModal({ editing: null })} onView={(g) => setDetailGame(g)} onEdit={(g) => setGameModal({ editing: g })} onDelete={(g) => deleteGame(g.id)} categoryOptions={categoryOptions} mechanismOptions={mechanismOptions} demoMode={demoMode} lists={displayLists} onCreateList={(name) => !demoMode && addList(name)} onOpenList={(l) => setDetailList(l)} />}
          {tab === "playlog" && <PlayLog plays={displayPlays} games={displayGames} onAdd={() => !demoMode && setPlayModal({ editing: null })} onEdit={(p) => !demoMode && setPlayModal({ editing: p })} onDelete={deletePlay} demoMode={demoMode} />}
          {tab === "recommendations" && <Recommendations games={displayGames} plays={displayPlays} onAddWishlist={addToWishlistFromRecommendation} />}
          {tab === "settings" && (
            <SettingsPage
              customCategories={customCategories}
              customMechanisms={customMechanisms}
              customPlayerTypes={customPlayerTypes}
              onAddCategory={addCustomCategory}
              onRemoveCategory={removeCustomCategory}
              onAddMechanism={addCustomMechanism}
              onRemoveMechanism={removeCustomMechanism}
              onAddPlayerType={addCustomPlayerType}
              onRemovePlayerType={removeCustomPlayerType}
              demoMode={demoMode}
              onToggleDemo={() => setDemoMode((d) => !d)}
              syncUrl={syncUrl}
              syncStatus={syncStatus}
              onOpenSync={() => setSyncModalOpen(true)}
            />
          )}
        </div>
      </div>
      <div className="shrink-0 bg-[#1C1B1A] border-t border-[#3A3631] px-2 pt-1.5 pb-2.5">
        <div className="flex justify-around">
          {tabs.map(t => (
            <button key={t.id} onClick={() => { setTab(t.id); if (t.id !== "collection") setQuickFilter(null); }} className="flex flex-col items-center gap-0.5 px-3 py-1 rounded-[14px] min-w-[64px]">
              <t.icon size={20} className={tab === t.id ? "text-[#D4A24C]" : "text-[#5C574F]"} strokeWidth={tab === t.id ? 2.5 : 2} />
              <span className={`text-[10px] font-body ${tab === t.id ? "text-[#D4A24C] font-semibold" : "text-[#5C574F]"}`}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
      {detailGame && (
        <GameDetailModal
          game={detailGame}
          plays={displayPlays}
          lists={demoMode ? null : displayLists}
          onToggleList={demoMode ? null : toggleGameInList}
          onCreateList={demoMode ? null : addList}
          onClose={() => setDetailGame(null)}
          onEdit={demoMode ? null : () => { setGameModal({ editing: detailGame }); setDetailGame(null); }}
        />
      )}
      {detailList && (
        <ListDetailModal
          list={displayLists.find((l) => l.id === detailList.id) || detailList}
          games={displayGames}
          plays={displayPlays}
          demoMode={demoMode}
          onClose={() => setDetailList(null)}
          onView={(g) => setDetailGame(g)}
          onDeleteList={removeList}
          onToggleGame={toggleGameInList}
        />
      )}
      {gameModal && (
        <GameFormModal
          initial={gameModal.editing}
          categoryOptions={categoryOptions}
          mechanismOptions={mechanismOptions}
          publisherOptions={publisherOptions}
          playerTypeOptions={playerTypeOptions}
          designerOptions={designerOptions}
          customPlayerTypeDescriptions={customPlayerTypeDescriptions}
          onAddCategory={addCustomCategory}
          onAddMechanism={addCustomMechanism}
          onAddPlayerType={addCustomPlayerType}
          onClose={() => setGameModal(null)}
          onSave={saveGame}
          onDelete={deleteGame}
        />
      )}
      {playModal && <PlayFormModal games={games} plays={plays} playerProfiles={displayPlayers} onAddPlayer={addPlayer} onUpdatePlayerPhoto={updatePlayerPhoto} initial={playModal.editing} onClose={() => setPlayModal(null)} onSave={savePlay} onDelete={deletePlay} />}
      {syncModalOpen && (
        <SyncModal
          initialUrl={syncUrl}
          status={syncStatus}
          lastSynced={lastSynced}
          onClose={() => setSyncModalOpen(false)}
          onSave={saveSyncUrl}
          onSyncNow={syncNow}
          onRemove={removeSync}
        />
      )}

      {commandBarOpen && (
        <CommandBarModal
          games={displayGames}
          plays={displayPlays}
          lists={displayLists}
          onClose={() => setCommandBarOpen(false)}
          onOpenGame={(g) => { setDetailGame(g); setCommandBarOpen(false); }}
          onOpenList={(l) => { setDetailList(l); setCommandBarOpen(false); }}
          onGoToPlaylog={() => { setTab("playlog"); setCommandBarOpen(false); }}
        />
      )}
      <Confetti active={celebrate} />
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div className="min-h-screen bg-[#1C1B1A] flex items-center justify-center p-6">
          <div className="max-w-sm text-center">
            <Dices size={32} className="text-[#C1443C] mx-auto mb-3" />
            <p className="text-[#F2EDE4] font-display text-xl mb-2">Kurz gestolpert</p>
            <p className="text-[#A39C8F] text-sm mb-5">Hier ist etwas schiefgelaufen. Deine Daten in Firebase sind davon nicht betroffen.</p>
            <button onClick={() => this.setState({ error: null })} className="w-full h-12 bg-[#6C7FE0] text-[#F2EDE4] rounded-[14px] font-medium mb-2">Nochmal versuchen</button>
            <button onClick={() => window.location.reload()} className="w-full h-12 bg-[#262422] border border-[#3A3631] text-[#F2EDE4] rounded-[14px] font-medium">App neu laden</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
